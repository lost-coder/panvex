# Panvex control-plane public API — OpenAPI 3.1 source of truth.
#
# Wave 3.3 — see docs/superpowers/plans/2026-05-08-api-codegen.md
# for the migration plan. Currently covers the trivial pilots
# (/healthz, /api/version) plus the /api/agents/* route group; future
# PRs add /api/clients/*, /api/jobs/*, etc. one group at a time.
#
# Generation:
#   make gen-openapi          # regenerate Go server + TypeScript types
#   make verify-openapi       # CI: assert generated outputs are in sync
#
# Tools (installed via `make install-tools`):
#   - oapi-codegen v2 (chi-server mode)
#   - openapi-typescript

openapi: 3.1.0

info:
  title: Panvex Control Plane API
  description: |
    Operator-facing HTTP API for the Panvex fleet management
    control-plane. Migrated incrementally from hand-rolled Zod
    schemas; consult `web/src/shared/api/schemas/` for endpoints not
    yet covered here.
  version: "1.0.0-pre"
  contact:
    name: Panvex maintainers
    url: https://github.com/lost-coder/panvex

servers:
  - url: /
    description: Same-origin (the panel serves both API and UI)

paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      description: |
        Returns 200 OK when the HTTP server is accepting connections.
        Plain `text/plain` body containing the literal string `ok` —
        kept text rather than JSON so kubelet's default probe parser
        doesn't have to recurse JSON.
      security: []  # unauthenticated probe
      responses:
        '200':
          description: Service is alive.
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /api/version:
    get:
      operationId: getVersion
      summary: Panel build identification
      description: |
        Returns the running panel's build metadata. Operator+ callers
        also get `commit_sha` and `build_time`; viewer-role responses
        carry only `version`.
      responses:
        '200':
          description: Panel build info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/agents:
    get:
      operationId: listAgents
      summary: List enrolled agents in operator's fleet scope
      description: |
        Returns every agent the calling operator can see, filtered by
        their fleet-group scope (R-S-14). Each entry carries the live
        runtime snapshot the panel last received plus optional
        certificate recovery state.
      tags: [agents]
      responses:
        '200':
          description: Agent inventory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/agents/enrollment-tokens:
    get:
      operationId: listEnrollmentTokens
      summary: List enrollment tokens visible to the operator
      description: |
        Returns every enrollment token whose fleet-group sits within
        the caller's scope (R-S-14). Raw token values are masked —
        only the creation response surfaces the bearer secret. Use
        `handle` to revoke without exposing the raw value.
      tags: [agents, enrollment]
      responses:
        '200':
          description: Token list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentTokenList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createEnrollmentToken
      summary: Mint a new enrollment token
      description: |
        Issues a one-time bootstrap token for an agent to enroll into
        the named fleet group. The raw `value` is returned ONLY here;
        listing endpoints expose only a masked form afterwards.
      tags: [agents, enrollment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnrollmentTokenRequest'
      responses:
        '201':
          description: Token created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateEnrollmentTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/agents/enrollment-tokens/{value}/revoke:
    parameters:
      - name: value
        in: path
        required: true
        description: |
          Either the raw token value or the stable handle (SHA-256
          prefix) returned in the listing payload. Both forms resolve
          to the same persistent record.
        schema:
          type: string
    post:
      operationId: revokeEnrollmentToken
      summary: Revoke an enrollment token
      description: |
        Marks the token as revoked so subsequent bootstrap attempts
        fail. Idempotent — revoking an already-revoked token returns
        204 without an audit event.
      tags: [agents, enrollment]
      responses:
        '204':
          description: Token revoked (or already revoked).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Agent UUID.
        schema:
          type: string
    patch:
      operationId: renameAgent
      summary: Rename an agent's display node-name
      description: |
        Updates the operator-facing label only; the agent's UUID and
        certificate identity are unaffected. Idempotent (no audit
        event when the new name equals the existing one).
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameAgentRequest'
      responses:
        '200':
          description: Updated agent record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deregisterAgent
      summary: Deregister an agent
      description: |
        Terminates the agent's gRPC session, deletes its persistent
        records (instances, recovery grants), and adds the agent ID
        to the in-memory revocation list so a reconnect with valid
        mTLS material is rejected at Connect time.
      tags: [agents]
      responses:
        '204':
          description: Agent deregistered.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/{id}/fleet-group:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: updateAgentFleetGroup
      summary: Reassign an agent to a different fleet group
      description: |
        Operator must be scoped over BOTH the current and target
        groups. No-op responses (existing == target) are returned
        with the current agent shape so the client can refresh
        without a special-cased branch.
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentFleetGroupRequest'
      responses:
        '200':
          description: Agent reassigned (or no-op).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/{id}/update:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: dispatchAgentUpdate
      summary: Enqueue a self-update job for an agent
      description: |
        Schedules an `agent_self_update` job carrying the resolved
        binary asset metadata. The agent picks it up via its
        long-poll session.
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchAgentUpdateRequest'
      responses:
        '200':
          description: Update job dispatched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchAgentUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/{id}/transport-mode:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      operationId: updateAgentTransportMode
      summary: Switch an agent between inbound and outbound transport
      description: |
        Persists the new transport mode in the DB, enqueues a
        `switch_transport_mode` job, and notifies the in-process
        transport manager so outbound supervisors are spawned or
        torn down immediately. `dial_address` is required when
        switching to outbound; the agent's listen-bind defaults
        to `:<port>` derived from `dial_address` when
        `listen_address` is omitted.
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentTransportModeRequest'
      responses:
        '204':
          description: Mode updated and job dispatched.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/provision-outbound:
    post:
      operationId: provisionOutboundAgent
      summary: Create an outbound agent and return its install command
      description: |
        One-call provisioning for outbound (reverse-mode) agents: inserts
        the agent row, issues a 5-minute bootstrap token, and returns the
        pre-baked `curl ... | sudo bash` one-liner the operator pastes on
        the agent host. Combines what would otherwise be `POST /agents`
        (no such endpoint today) and `POST /agents/{id}/install-command`
        into a single round-trip, mirroring the simplicity of the inbound
        `POST /agents/enrollment-tokens` flow.

        Cancellation: if the operator backs out of the wizard before
        running the command, the frontend should call
        `DELETE /api/agents/{id}` (admin) to remove the orphan row. A
        nightly sweep also prunes rows whose `bootstrap_expires_at` has
        elapsed without a first connection.
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProvisionOutboundAgentRequest' }
      responses:
        '201':
          description: Agent provisioned, install command issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProvisionOutboundAgentResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: node_name already in use within this fleet group.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Install-command endpoint not configured.
          content:
            text/plain:
              schema:
                type: string

  /api/agents/{id}/install-command:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: createAgentInstallCommand
      summary: Generate a one-line installer for an outbound agent
      description: |
        Issues a fresh bootstrap token (replacing any prior token)
        and returns a `curl ... | sudo bash` one-liner the operator
        runs on the agent host. Available only for agents already
        in `outbound` transport mode.
      tags: [agents]
      responses:
        '200':
          description: Install command issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallCommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          description: Install-command endpoint not configured.
          content:
            text/plain:
              schema:
                type: string

  /api/agents/{id}/certificate-recovery-grants:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: createAgentCertificateRecoveryGrant
      summary: Allow an agent to recover an expired certificate
      description: |
        Admins issue a time-bounded grant so an agent whose mTLS
        certificate has expired can present a proof-of-possession
        and receive a fresh certificate without re-enrolling.
      tags: [agents, recovery]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCertificateRecoveryGrantRequest'
      responses:
        '201':
          description: Grant created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCertificateRecoveryGrant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/agents/{id}/certificate-recovery-grants/revoke:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: revokeAgentCertificateRecoveryGrant
      summary: Revoke a previously-issued recovery grant
      description: |
        Marks the agent's recovery grant as revoked so a stale grant
        cannot be redeemed. Returns the updated grant snapshot.
      tags: [agents, recovery]
      responses:
        '200':
          description: Grant revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCertificateRecoveryGrant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    VersionResponse:
      type: object
      description: Build metadata for the running control-plane process.
      required: [version]
      properties:
        version:
          type: string
          description: Semantic version (or "dev" for unstamped builds).
          example: 1.4.7
        commit_sha:
          type: string
          description: Git commit hash baked in at build time. Operator+ only.
        build_time:
          type: string
          format: date-time
          description: RFC3339 build timestamp. Operator+ only.

    Error:
      type: object
      description: Standard error envelope used by every 4xx / 5xx response.
      required: [error]
      properties:
        error:
          type: string
          description: Machine-readable error code (e.g. `not_found`, `forbidden`).
        message:
          type: string
          description: Human-readable message; safe to display to operators.
        details:
          type: object
          description: Optional structured context. Shape varies per error code.
          additionalProperties: true

    Agent:
      type: object
      description: |
        Control-plane snapshot of one enrolled agent. Mirrors the Go
        `server.Agent` struct (`internal/controlplane/server/types.go`).
      required:
        - id
        - node_name
        - fleet_group_id
        - version
        - read_only
        - presence_state
        - runtime
        - last_seen_at
      properties:
        id:
          type: string
          description: Agent UUID.
        node_name:
          type: string
          description: Operator-facing display name.
        fleet_group_id:
          type: string
          description: UUID of the fleet group the agent belongs to.
        version:
          type: string
          description: Agent binary semver as last reported.
        read_only:
          type: boolean
          description: True when the agent serves read-only Telemt instances.
        presence_state:
          type: string
          description: |
            Live presence evaluation — `online`, `flapping`, `offline`, etc.
            Computed at request time from session + heartbeat data.
        transport_reconnect_pending:
          type: boolean
          description: |
            True when the agent was switched to outbound transport but the
            panel has not accepted a session from/to it since the switch
            ("switched but never reconnected"). Cleared on the next accepted
            agent stream.
        certificate_recovery:
          allOf:
            - $ref: '#/components/schemas/AgentCertificateRecoveryGrant'
          description: |
            Optional snapshot of any active certificate-recovery grant
            for the agent. Absent when no grant has been issued.
        cert_issued_at:
          type: string
          format: date-time
          description: Issuance timestamp of the agent's current certificate.
        cert_expires_at:
          type: string
          format: date-time
          description: Expiry timestamp of the agent's current certificate.
        runtime:
          $ref: '#/components/schemas/AgentRuntime'
        last_seen_at:
          type: string
          format: date-time
          description: Last successful heartbeat timestamp.

    AgentList:
      type: array
      description: List response from `GET /api/agents`.
      items:
        $ref: '#/components/schemas/Agent'

    AgentRuntime:
      type: object
      description: |
        Telemt operator overview reported by the agent. The set of
        fields is defensive on the Zod side because backends can ship
        new counters without an immediate web release; on the spec
        side we list every field the panel currently consumes.
      required:
        - accepting_new_connections
        - me_runtime_ready
        - me2dc_fallback_enabled
        - use_middle_proxy
        - startup_status
        - startup_stage
        - startup_progress_pct
        - initialization_status
        - degraded
        - initialization_stage
        - initialization_progress_pct
        - transport_mode
        - current_connections
        - current_connections_me
        - current_connections_direct
        - active_users
        - uptime_seconds
        - connections_total
        - connections_bad_total
        - handshake_timeouts_total
        - configured_users
        - dc_coverage_pct
        - healthy_upstreams
        - total_upstreams
        - fail_rate_pct_5m
        - fail_rate_known
        - connect_attempt_total
        - connect_success_total
        - connect_fail_total
        - connect_failfast_total
        - dcs
        - upstreams
        - recent_events
        - system_load
        - telemt_unreachable
        - telemt_unreachable_since_unix
        - updated_at
      properties:
        accepting_new_connections: { type: boolean }
        me_runtime_ready: { type: boolean }
        me2dc_fallback_enabled: { type: boolean }
        use_middle_proxy: { type: boolean }
        startup_status: { type: string }
        startup_stage: { type: string }
        startup_progress_pct: { type: number, format: double }
        initialization_status: { type: string }
        degraded: { type: boolean }
        lifecycle_state: { type: string }
        initialization_stage: { type: string }
        initialization_progress_pct: { type: number, format: double }
        transport_mode: { type: string }
        current_connections: { type: integer }
        current_connections_me: { type: integer }
        current_connections_direct: { type: integer }
        active_users: { type: integer }
        uptime_seconds: { type: number, format: double }
        connections_total: { type: integer, format: int64, minimum: 0 }
        connections_bad_total: { type: integer, format: int64, minimum: 0 }
        handshake_timeouts_total: { type: integer, format: int64, minimum: 0 }
        configured_users: { type: integer }
        dc_coverage_pct: { type: number, format: double }
        healthy_upstreams: { type: integer }
        total_upstreams: { type: integer }
        fail_rate_pct_5m:
          type: number
          format: double
          description: |
            5-minute upstream connect fail-rate. Read together with
            `fail_rate_known`: `false` means "unknown", not "0%".
        fail_rate_known: { type: boolean }
        connect_attempt_total: { type: integer, format: int64, minimum: 0 }
        connect_success_total: { type: integer, format: int64, minimum: 0 }
        connect_fail_total: { type: integer, format: int64, minimum: 0 }
        connect_failfast_total: { type: integer, format: int64, minimum: 0 }
        fallback_entered_at_unix:
          type: integer
          format: int64
          nullable: true
          description: |
            Unix timestamp the panel observed this agent enter
            ME→DC fallback. Absent when not in fallback.
        reroute_active: { type: boolean }
        route_mode: { type: string }
        me2dc_fast_enabled: { type: boolean }
        stale_cache_used: { type: boolean }
        top_by_connections:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeTopByConnections'
        top_by_throughput:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeTopByThroughput'
        dcs:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeDC'
        upstreams:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeUpstream'
        recent_events:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeEvent'
        system_load:
          $ref: '#/components/schemas/RuntimeSystemLoad'
        me_writers_summary:
          $ref: '#/components/schemas/RuntimeMeWritersSummary'
        telemt_unreachable: { type: boolean }
        telemt_unreachable_since_unix: { type: integer, format: int64 }
        updated_at:
          type: string
          format: date-time

    RuntimeEvent:
      type: object
      required: [sequence, timestamp_unix, event_type, context]
      properties:
        sequence: { type: integer, format: int64, minimum: 0 }
        timestamp_unix: { type: integer, format: int64 }
        event_type: { type: string }
        context: { type: string }

    RuntimeDC:
      type: object
      required:
        - dc
        - available_endpoints
        - available_pct
        - required_writers
        - alive_writers
        - coverage_pct
        - fresh_alive_writers
        - fresh_coverage_pct
        - rtt_ms
        - load
      properties:
        dc: { type: integer }
        available_endpoints: { type: integer }
        available_pct: { type: number, format: double }
        required_writers: { type: integer }
        alive_writers: { type: integer }
        coverage_pct: { type: number, format: double }
        fresh_alive_writers: { type: integer }
        fresh_coverage_pct: { type: number, format: double }
        rtt_ms: { type: number, format: double }
        load: { type: integer }

    RuntimeUpstream:
      type: object
      required:
        - upstream_id
        - route_kind
        - address
        - healthy
        - fails
        - effective_latency_ms
        - weight
        - last_check_age_secs
      properties:
        upstream_id: { type: integer }
        route_kind: { type: string }
        address: { type: string }
        healthy: { type: boolean }
        fails: { type: integer }
        effective_latency_ms: { type: number, format: double }
        weight: { type: integer }
        last_check_age_secs: { type: integer }
        scopes:
          type: array
          items: { type: string }

    RuntimeSystemLoad:
      type: object
      required:
        - cpu_usage_pct
        - memory_used_bytes
        - memory_total_bytes
        - memory_usage_pct
        - disk_used_bytes
        - disk_total_bytes
        - disk_usage_pct
        - load_1m
        - load_5m
        - load_15m
        - net_bytes_sent
        - net_bytes_recv
      properties:
        cpu_usage_pct: { type: number, format: double }
        memory_used_bytes: { type: integer, format: int64, minimum: 0 }
        memory_total_bytes: { type: integer, format: int64, minimum: 0 }
        memory_usage_pct: { type: number, format: double }
        disk_used_bytes: { type: integer, format: int64, minimum: 0 }
        disk_total_bytes: { type: integer, format: int64, minimum: 0 }
        disk_usage_pct: { type: number, format: double }
        load_1m: { type: number, format: double }
        load_5m: { type: number, format: double }
        load_15m: { type: number, format: double }
        net_bytes_sent: { type: integer, format: int64, minimum: 0 }
        net_bytes_recv: { type: integer, format: int64, minimum: 0 }

    RuntimeMeWritersSummary:
      type: object
      required:
        - configured_endpoints
        - available_endpoints
        - coverage_pct
        - fresh_alive_writers
        - fresh_coverage_pct
        - required_writers
        - alive_writers
      properties:
        configured_endpoints: { type: integer }
        available_endpoints: { type: integer }
        coverage_pct: { type: number, format: double }
        fresh_alive_writers: { type: integer }
        fresh_coverage_pct: { type: number, format: double }
        required_writers: { type: integer }
        alive_writers: { type: integer }

    RuntimeTopByConnections:
      type: object
      required: [username, connections]
      properties:
        username: { type: string }
        connections: { type: integer }

    RuntimeTopByThroughput:
      type: object
      required: [username, throughput_bytes]
      properties:
        username: { type: string }
        throughput_bytes: { type: integer, format: int64, minimum: 0 }

    AgentCertificateRecoveryGrant:
      type: object
      description: Lifecycle snapshot of a single recovery grant.
      required:
        - agent_id
        - status
        - issued_at_unix
        - expires_at_unix
      properties:
        agent_id: { type: string }
        status:
          type: string
          enum: [allowed, expired, used, revoked]
        issued_at_unix: { type: integer, format: int64 }
        expires_at_unix: { type: integer, format: int64 }
        used_at_unix:
          type: integer
          format: int64
          nullable: true
        revoked_at_unix:
          type: integer
          format: int64
          nullable: true

    EnrollmentTokenList:
      type: array
      items:
        $ref: '#/components/schemas/EnrollmentTokenListItem'

    EnrollmentTokenListItem:
      type: object
      description: |
        Listing-safe view of an enrollment token. The raw `value` is
        intentionally absent — only the creation response surfaces
        the bearer secret. Use `handle` (SHA-256 prefix) to revoke.
      required:
        - panel_url
        - fleet_group_id
        - status
        - issued_at_unix
        - expires_at_unix
      properties:
        masked_value:
          type: string
          description: Truncated form of the raw value, ellipsis-suffixed.
        handle:
          type: string
          description: SHA-256 prefix of the raw value, hex-encoded.
        panel_url:
          type: string
        fleet_group_id:
          type: string
        status:
          type: string
          enum: [active, expired, consumed, revoked]
        issued_at_unix: { type: integer, format: int64 }
        expires_at_unix: { type: integer, format: int64 }
        consumed_at_unix:
          type: integer
          format: int64
          nullable: true
        revoked_at_unix:
          type: integer
          format: int64
          nullable: true

    CreateEnrollmentTokenRequest:
      type: object
      required: [ttl_seconds]
      properties:
        fleet_group_id:
          type: string
          description: |
            Either the canonical UUID or the friendly slug; empty
            string falls back to the default fleet group.
        ttl_seconds:
          type: integer
          minimum: 1
          description: Token lifetime in seconds.

    ScriptSource:
      type: object
      description: |
        Pointer to a hosted copy of the agent install script
        (`install-agent.sh`). Each source carries its own URL; the
        Panel-served copy also exports its SHA-256 so the operator
        client can render a tamper-resistant curl|sudo-bash form.
      required: [url]
      properties:
        url:
          type: string
          description: Fully-qualified HTTPS URL to install-agent.sh.
        sha256:
          type: string
          nullable: true
          description: |
            Lowercase hex SHA-256 of the script body. Populated for the
            Panel-served source (the panel knows the exact bytes it is
            serving); null for the GitHub-hosted fallback (no
            panel-side integrity guarantee — operators pin a release
            tag instead).

    ScriptSources:
      type: object
      description: |
        The two canonical sources from which an agent host can fetch
        the install script. Operators choose between them in the
        Add-Server wizard — Panel for the default inbound case (panel
        is reachable, integrity-checked), GitHub for outbound (panel
        is firewalled from the agent host) or cold-bootstrap.
      required: [panel, github]
      properties:
        panel:
          $ref: '#/components/schemas/ScriptSource'
        github:
          $ref: '#/components/schemas/ScriptSource'

    CreateEnrollmentTokenResponse:
      type: object
      description: |
        Response to a successful `POST /api/agents/enrollment-tokens`.
        The raw `value` is exposed once at this moment; subsequent
        listings only carry the masked form.
      required:
        - value
        - panel_url
        - fleet_group_id
        - issued_at_unix
        - expires_at_unix
        - ca_pem
        - script_sources
      properties:
        value:
          type: string
          description: The raw bootstrap token. Returned only at creation.
        panel_url:
          type: string
        fleet_group_id:
          type: string
        issued_at_unix: { type: integer, format: int64 }
        expires_at_unix: { type: integer, format: int64 }
        ca_pem:
          type: string
          description: PEM-encoded panel CA certificate.
        script_sources:
          $ref: '#/components/schemas/ScriptSources'

    RenameAgentRequest:
      type: object
      required: [node_name]
      properties:
        node_name:
          type: string
          minLength: 1

    UpdateAgentFleetGroupRequest:
      type: object
      required: [fleet_group_id]
      properties:
        fleet_group_id:
          type: string
          minLength: 1
          description: Target fleet-group UUID. Must already exist.

    UpdateAgentTransportModeRequest:
      type: object
      required: [transport_mode]
      properties:
        transport_mode:
          type: string
          enum: [inbound, outbound]
        dial_address:
          type: string
          description: |
            Public host:port the panel dials (required for outbound).
        listen_address:
          type: string
          description: |
            Agent-side bind spec. Optional — defaults to `:<port>`
            derived from `dial_address` when omitted.

    DispatchAgentUpdateRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
          description: Target agent binary version.

    DispatchAgentUpdateResponse:
      type: object
      required: [job_id, status, version]
      properties:
        job_id:
          type: string
        status:
          type: string
          example: dispatched
        version:
          type: string

    InstallCommandAdvancedOptions:
      type: object
      description: |
        Optional per-install overrides — the wizard's "Advanced" section.
        All fields nullable / omittable so the default install (with the
        agent's built-in Telemt defaults) needs none of these.
      properties:
        telemt_url:
          type: string
          nullable: true
          description: Override the agent's Telemt API URL.
        telemt_metrics_url:
          type: string
          nullable: true
          description: Override the agent's Telemt metrics URL.
        telemt_auth:
          type: string
          nullable: true
          description: |
            Authorization header value (e.g. "Bearer xxx") the agent
            forwards to Telemt. Empty / omitted = no auth header.
        insecure_transport:
          type: boolean
          nullable: true
          description: |
            Opt-in: allow plain-HTTP panel URLs on non-loopback hosts.
            Intended for VPN-only / private-network deploys where the
            bootstrap-key handshake transits in cleartext.

    ProvisionOutboundAgentRequest:
      type: object
      required: [node_name, fleet_group_id, dial_address]
      properties:
        node_name:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Operator-supplied display name. Must satisfy the same
            character class enforced for inbound enrollment
            (`[A-Za-z0-9._-]+`), since the value is interpolated into
            the curl|bash one-liner as a CLI flag value.
        fleet_group_id:
          type: string
          description: |
            Canonical fleet-group UUID or friendly slug. Empty string
            falls back to the operator's default fleet group.
        dial_address:
          type: string
          description: |
            Public host:port the panel dials to reach the agent. Used
            both for the agent's listen bind (derived port) and for
            the panel's outbound supervisor target.
          example: "203.0.113.10:8443"
        script_source:
          type: string
          enum: [panel, github]
          default: github
          description: |
            Source from which the agent host fetches install-agent.sh.
            'github' is the default for outbound because the panel is
            typically firewalled from the agent host (otherwise the
            operator would use inbound mode); 'panel' is supported for
            cases where the agent can reach the panel during bootstrap
            even though the steady-state transport is reverse.
        advanced:
          $ref: '#/components/schemas/InstallCommandAdvancedOptions'

    ProvisionOutboundAgentResponse:
      type: object
      description: |
        Returned by `POST /api/agents/provision-outbound`. Mirrors
        InstallCommandResponse plus the freshly-minted agent_id so the
        wizard can poll `GET /api/agents/{id}` for the first connection
        and call `DELETE /api/agents/{id}` on cancel.
      required: [agent_id, command, expires_at_unix, script_url]
      properties:
        agent_id:
          type: string
        command:
          type: string
          description: Pre-baked `curl ... | sudo bash -s -- ...` one-liner.
        expires_at_unix:
          type: integer
          format: int64
        script_url:
          type: string
          description: |
            The URL the curl in the command points at — exposed so the
            wizard can show the operator which source was used.

    InstallCommandResponse:
      type: object
      description: |
        Pre-baked `curl ... | sudo bash -s -- ...` one-liner the
        operator runs on the host to install or re-bootstrap a
        reverse-mode agent.
      required: [command, expires_at_unix]
      properties:
        command:
          type: string
        expires_at_unix:
          type: integer
          format: int64

    CreateCertificateRecoveryGrantRequest:
      type: object
      properties:
        ttl_seconds:
          type: integer
          minimum: 0
          description: |
            Grant lifetime in seconds. Zero or omitted yields the
            server's default TTL (15m, capped at 1h).

  responses:
    BadRequest:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Caller is not authenticated.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Caller is authenticated but lacks the required role/scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested resource does not exist or is out-of-scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: panvex_session
      description: |
        Server-issued session cookie set by `POST /api/login`. Marked
        Secure + HttpOnly + SameSite=Lax in production; the bare
        non-prefixed name above is the dev fallback for plain-HTTP
        loopback (the production runtime sets `__Host-panvex_session`
        instead — same auth flow, different cookie attribute set).

security:
  - sessionCookie: []
