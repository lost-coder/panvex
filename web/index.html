<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Panvex Control Room</title>
    <!-- Mobile browser chrome (Stage 5 down-payment): tint the address bar /
         status bar to match the active theme and allow add-to-home-screen
         to launch standalone. viewport-fit=cover pairs with the
         env(safe-area-inset-*) padding the layout already reserves.
         Full PWA install (icon set + manifest), push, and an actionable
         dashboard remain separate feature efforts — see the review doc. -->
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0d12" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f6f8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Panvex" />
    <!-- Relative hrefs resolve against the injected <base href> (server-side
         ui.go), so install works under both root and /pan-style mounts. -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <!-- Fonts are self-hosted via @fontsource and bundled by Vite from
         src/ui-kit.css; no external font CDN. -->
  </head>
  <body>
    <!--
      P2-FE-08 / M-F7: Skip-nav link — first focusable element so keyboard
      users can jump past the persistent sidebar/header on every page. The
      target `#main-content` lives on <main> inside AppShell. The link is
      visually hidden off-screen and only slides into view on :focus, which
      keeps the visual design untouched for pointer users.
    -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root">
      <!--
        Boot fallback. Rendered as static HTML so the operator sees a
        meaningful state before the JS bundle has parsed — and, crucially,
        if the bundle never loads at all (CSP/MIME failure, broken deploy,
        offline). React clears #root when it mounts, so this disappears on
        a healthy boot. The "Still blank?" hint fades in via a CSS-only
        animation after a few seconds; we deliberately avoid an inline
        script (would require script-src 'unsafe-inline').
      -->
      <div class="boot-fallback" role="status" aria-live="polite">
        <div class="boot-fallback__spinner" aria-hidden="true"></div>
        <h1 class="boot-fallback__title">Loading Panvex…</h1>
        <noscript>
          <p class="boot-fallback__error">
            JavaScript is disabled. Panvex needs JavaScript to render the
            control room. Enable it in your browser settings and reload.
          </p>
        </noscript>
        <div class="boot-fallback__hint">
          <p class="boot-fallback__hint-title">Still blank?</p>
          <p class="boot-fallback__hint-body">
            The UI bundle didn't finish loading. This is usually a stale
            browser cache, a blocked asset, or a panel that hasn't been
            rebuilt after a deploy. Open the browser console (F12) for
            details, then hard-reload (Ctrl/Cmd + Shift + R).
          </p>
          <a class="boot-fallback__hint-action" href=".">Reload page</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
  </html>
