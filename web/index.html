      P2-FE-08 / M-F7: Skip-nav link — first focusable element so keyboard
      users can jump past the persistent sidebar/header on every page. The
      target `#main-content` lives on <main> inside AppShell. The link is
      visually hidden off-screen and only slides into view on :focus, which
      keeps the visual design untouched for pointer users.
    -->
