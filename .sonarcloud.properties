# SonarCloud automatic analysis configuration.
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis
#
# Project key, organization, project name and sources are configured via the
# SonarCloud UI for automatic analysis — only exclusion/inclusion/issue
# filtering keys from this file are honoured.

# Generated code: never edited by hand, do not analyse.
# - internal/dbsqlc: sqlc output, regenerated from db/queries
# - internal/gatewayrpc/*.pb.go and *_grpc.pb.go: protoc output
# - .embedded-ui / web/dist: production bundle artefacts
sonar.exclusions=internal/dbsqlc/**,internal/gatewayrpc/*.pb.go,**/.embedded-ui/**,web/dist/**,web/.embedded-ui/**

# Copy/paste detection: skip directories where duplication is intrinsic
# rather than accidental.
#
# - db/migrations: Postgres and SQLite carry parallel copies of the
#   same schema by necessity. The two dialects diverge in subtle ways
#   (UUID vs TEXT, gen_random_uuid() vs random hex), so we keep both
#   files authoritative instead of generating one from the other.
# - internal/controlplane/storage/{postgres,sqlite}: the per-backend
#   stores share method shapes by design (same Store interface), but
#   the bodies are dialect-specific.
# - **/*_test.go and **/*_test.tsx: contract-style tests intentionally
#   repeat setup blocks so each scenario reads as a self-contained
#   table row.
sonar.cpd.exclusions=db/migrations/**,internal/controlplane/storage/postgres/**,internal/controlplane/storage/sqlite/**,**/*_test.go,**/*_test.tsx,**/*.test.ts,**/*.test.tsx,**/*.stories.tsx,**/*.stories.ts
