name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out

  panel-build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build -o /dev/null ./cmd/control-plane
      - run: go build -o /dev/null ./cmd/agent

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: lost-coder/panvex-ui
          path: ../ui
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build UI kit
        working-directory: ../ui
        run: npm ci && npm run build
      - name: Install and build frontend
        working-directory: web
        run: npm ci && npm run build

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: lost-coder/panvex-ui
          path: ../ui
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build UI kit
        working-directory: ../ui
        run: npm ci && npm run build
      - name: Lint frontend
        working-directory: web
        run: npm ci && npm run lint

  buf-lint:
    name: Protobuf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          lint: true

  sqlc-check:
    name: SQLc Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: '1.30.0'
      - run: sqlc diff
