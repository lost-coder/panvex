name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out

  schema-sync:
    # C9: verify the PostgreSQL and SQLite migration bundles produce
    # the same set of tables and columns. The test is a no-op locally
    # without PANVEX_POSTGRES_TEST_DSN; this job pipes it in so PRs
    # that silently drift the two schemas fail here instead of in
    # production (where 0011_column_drift.sql had to patch things up).
    name: Schema Sync (PG vs SQLite)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: panvex
          POSTGRES_PASSWORD: panvex
          POSTGRES_DB: panvex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PANVEX_POSTGRES_TEST_DSN: postgres://panvex:panvex@127.0.0.1:5432/panvex_test?sslmode=disable
      PANVEX_ALLOW_INSECURE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Run schema-sync tests
        run: go test -count=1 -run TestSchemaSync ./internal/controlplane/storage/migrate/...

  panel-build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build -o /dev/null ./cmd/control-plane
      - run: go build -o /dev/null ./cmd/agent

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  go-vuln:
    name: Go Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # Phase 4 inlined @lost-coder/panvex-ui into web/src/ui/, so the
  # frontend jobs no longer need to clone + build a side-repo UI-kit
  # or symlink ../ui. They just npm ci + run the target script.
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install and build frontend
        working-directory: web
        run: npm ci && npm run build

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # P2-TEST-01: vitest suite. npm run test = vitest run which exits
      # non-zero on any failure; coverage is gated by thresholds in
      # vitest.config.ts so a regression under 40% also fails CI.
      - name: Run frontend tests
        working-directory: web
        run: npm ci && npm run test
      - name: Run coverage with thresholds
        working-directory: web
        run: npm run test:coverage

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Lint frontend
        working-directory: web
        run: npm ci && npm run lint

  frontend-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Audit web dependencies
        working-directory: web
        run: npm audit --audit-level=high

  buf-lint:
    name: Protobuf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          lint: true

  sqlc-check:
    name: SQLc Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sqlc-dev/setup-sqlc@v5
        with:
          sqlc-version: '1.30.0'
      - run: sqlc diff
