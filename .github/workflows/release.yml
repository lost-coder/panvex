name: Release

on:
  push:
    tags:
      - 'control-plane/v*'
      - 'agent/v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine component from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          COMPONENT="${TAG%%/*}"
          VERSION="${TAG#*/}"
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build frontend (control-plane only)
        if: steps.meta.outputs.component == 'control-plane'
        run: |
          cd ui && npm ci && npm run build
          cd ../core/web && npm ci && npm run build:embed

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          COMPONENT="${{ steps.meta.outputs.component }}"
          VERSION="${{ steps.meta.outputs.version }}"
          BINARY="panvex-${COMPONENT}-linux-${{ matrix.arch }}"
          cd core
          if [ "$COMPONENT" = "control-plane" ]; then
            go build -tags embeddedui \
              -ldflags "-X main.Version=${VERSION} -X main.CommitSHA=${GITHUB_SHA::8} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "../${BINARY}" ./cmd/control-plane
          else
            go build \
              -ldflags "-X main.AgentVersion=${VERSION} -X main.CommitSHA=${GITHUB_SHA::8} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "../${BINARY}" ./cmd/agent
          fi
          cd ..
          sha256sum "${BINARY}" | awk '{print $1}' > "${BINARY}.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            panvex-*-linux-${{ matrix.arch }}
            panvex-*-linux-${{ matrix.arch }}.sha256
          generate_release_notes: true
