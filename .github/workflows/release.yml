name: Release

on:
  push:
    tags:
      - 'control-plane/v*'
      - 'agent/v*'

permissions:
  contents: write
  # Needed for cosign keyless SBOM signing AND actions/attest-build-provenance:
  # both trade the job's GitHub-issued OIDC token for a Fulcio cert (cosign)
  # or a Sigstore bundle (attest action). No long-lived signing key on either
  # path — the archive's .sig is still signed with the pinned ECDSA key
  # (PANVEX_SIGNING_KEY) because the embedded verifier in the agent pins
  # to that pubkey.
  id-token: write
  # Phase-3 §3.4: actions/attest-build-provenance writes SLSA build
  # provenance attestations to GitHub's attestations API + Sigstore.
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      # Phase 4 inlined @lost-coder/panvex-ui into web/src/ui/, so the
      # release build no longer clones the side-repo or symlinks ../ui.

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Determine component from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          COMPONENT="${TAG%%/*}"
          VERSION="${TAG#*/}"
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build frontend (control-plane only)
        if: steps.meta.outputs.component == 'control-plane'
        run: |
          cd web && npm ci && npm run build:embed

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          COMPONENT: ${{ steps.meta.outputs.component }}
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          BINARY="panvex-${COMPONENT}-linux-${GOARCH}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="${COMMIT_SHA::8}"
          if [ "$COMPONENT" = "control-plane" ]; then
            go build -tags embeddedui \
              -ldflags "-X main.Version=${VERSION} -X main.CommitSHA=${SHORT_SHA} -X main.BuildTime=${BUILD_TIME}" \
              -o "${BINARY}" ./cmd/control-plane
          else
            go build \
              -ldflags "-X main.AgentVersion=${VERSION} -X main.CommitSHA=${SHORT_SHA} -X main.BuildTime=${BUILD_TIME}" \
              -o "${BINARY}" ./cmd/agent
          fi
          ARCHIVE="${BINARY}.tar.gz"
          tar czf "${ARCHIVE}" "${BINARY}"
          sha256sum "${ARCHIVE}" | awk '{print $1}' > "${ARCHIVE}.sha256"
          rm "${BINARY}"

      # Sign the archive with the release private key. The key material comes
      # from the PANVEX_SIGNING_KEY secret (PEM-encoded ECDSA P-256); it is
      # written to a mode-0600 temp file and removed once signing completes.
      # Verification at runtime uses the matching public key embedded in the
      # binary at internal/security/signing_key.pub.
      - name: Sign archive
        env:
          SIGNING_KEY: ${{ secrets.PANVEX_SIGNING_KEY }}
          GOARCH: ${{ matrix.arch }}
        run: |
          if [ -z "${SIGNING_KEY:-}" ]; then
            echo "::error::PANVEX_SIGNING_KEY secret is not configured" >&2
            exit 1
          fi
          ARCHIVE_GLOB="panvex-*-linux-${GOARCH}.tar.gz"
          KEY_FILE="$(mktemp)"
          chmod 600 "$KEY_FILE"
          trap 'shred -u "$KEY_FILE" 2>/dev/null || rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$SIGNING_KEY" > "$KEY_FILE"
          for ARCHIVE in ${ARCHIVE_GLOB}; do
            openssl dgst -sha256 -sign "$KEY_FILE" -out "${ARCHIVE}.sig" "${ARCHIVE}"
            echo "Signed ${ARCHIVE} -> ${ARCHIVE}.sig"
          done

      # Generate a CycloneDX JSON SBOM for each release archive so downstream
      # consumers can audit the exact module tree shipped in the binary.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: panvex-${{ steps.meta.outputs.component }}-linux-${{ matrix.arch }}.sbom.json
          output-file: panvex-${{ steps.meta.outputs.component }}-linux-${{ matrix.arch }}.sbom.json
          upload-artifact: false
          upload-release-assets: false

      # Phase-3 §3.4: SLSA build provenance attestation. Records the
      # exact workflow file, runner, and inputs that produced the
      # archive into Sigstore + the GitHub attestations API. Verify
      # off the runner with:
      #   gh attestation verify panvex-…tar.gz \
      #     --owner lost-coder --repo panvex
      # Independent of the ECDSA archive .sig (which the agent pins
      # to embedded keys for in-binary verification): provenance
      # answers "where did this artifact come from", signature
      # answers "is it intact and from a trusted signer".
      - name: Attest build provenance for archive
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: panvex-*-linux-${{ matrix.arch }}.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Sign the SBOM keyless via Sigstore: the job swaps its
      # GitHub-Actions OIDC token for a short-lived Fulcio certificate,
      # cosign signs the SBOM with it, and the event lands in Rekor.
      # No long-lived private key on the SBOM path — the archive's
      # `.tar.gz.sig` is still signed with the pinned ECDSA key because
      # the agent's embedded verifier pins to that pubkey.
      #
      # Verification (off the runner):
      #   cosign verify-blob \
      #     --certificate panvex-…sbom.json.crt \
      #     --signature    panvex-…sbom.json.sig \
      #     --certificate-identity-regexp 'https://github\.com/lost-coder/panvex/\.github/workflows/release\.yml@refs/tags/(agent|control-plane)/v.*' \
      #     --certificate-oidc-issuer     https://token.actions.githubusercontent.com \
      #     panvex-…sbom.json
      - name: Sign SBOM (keyless)
        env:
          GOARCH: ${{ matrix.arch }}
          COMPONENT: ${{ steps.meta.outputs.component }}
        run: |
          SBOM="panvex-${COMPONENT}-linux-${GOARCH}.sbom.json"
          cosign sign-blob --yes \
            --output-signature   "${SBOM}.sig" \
            --output-certificate "${SBOM}.crt" \
            "${SBOM}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            panvex-*-linux-${{ matrix.arch }}.tar.gz
            panvex-*-linux-${{ matrix.arch }}.tar.gz.sha256
            panvex-*-linux-${{ matrix.arch }}.tar.gz.sig
            panvex-*-linux-${{ matrix.arch }}.sbom.json
            panvex-*-linux-${{ matrix.arch }}.sbom.json.sig
            panvex-*-linux-${{ matrix.arch }}.sbom.json.crt
          generate_release_notes: true
