name: Release

on:
  push:
    tags:
      - 'control-plane/v*'
      - 'agent/v*'

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lost-coder'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine component from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          COMPONENT="${TAG%%/*}"
          VERSION="${TAG#*/}"
          echo "component=$COMPONENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build frontend (control-plane only)
        if: steps.meta.outputs.component == 'control-plane'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd web && npm ci && npm run build:embed

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          COMPONENT: ${{ steps.meta.outputs.component }}
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          BINARY="panvex-${COMPONENT}-linux-${GOARCH}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="${COMMIT_SHA::8}"
          if [ "$COMPONENT" = "control-plane" ]; then
            go build -tags embeddedui \
              -ldflags "-X main.Version=${VERSION} -X main.CommitSHA=${SHORT_SHA} -X main.BuildTime=${BUILD_TIME}" \
              -o "${BINARY}" ./cmd/control-plane
          else
            go build \
              -ldflags "-X main.AgentVersion=${VERSION} -X main.CommitSHA=${SHORT_SHA} -X main.BuildTime=${BUILD_TIME}" \
              -o "${BINARY}" ./cmd/agent
          fi
          ARCHIVE="${BINARY}.tar.gz"
          tar czf "${ARCHIVE}" "${BINARY}"
          sha256sum "${ARCHIVE}" | awk '{print $1}' > "${ARCHIVE}.sha256"
          rm "${BINARY}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            panvex-*-linux-${{ matrix.arch }}.tar.gz
            panvex-*-linux-${{ matrix.arch }}.tar.gz.sha256
          generate_release_notes: true
