version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - enhancement

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    labels:
      - enhancement
    # react and react-dom must move in lockstep — react-dom hard-fails on a
    # version skew ("Incompatible React versions"). Group them (with their
    # @types) so a bump is one coherent PR instead of a react-only PR that
    # breaks the build against the lagging react-dom.
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - enhancement

  # Phase-3 §3.3: track Dockerfile base images so a CVE in
  # node/golang/alpine/nginx surfaces as a Dependabot PR within a
  # week instead of riding stale on the registry's `-alpine` tag.
  # Once an operator pins a digest (FROM image:tag@sha256:...),
  # Dependabot keeps that digest current alongside the tag.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - enhancement
      - security

  # docker-compose pulls postgres/nginx/etc directly. Without a scan
  # entry for /deploy, the floating `postgres:16-alpine` tag in the
  # prod compose file silently rides registry updates. With this
  # entry, Dependabot files digest-pin PRs the same way it does for
  # the Dockerfile.
  - package-ecosystem: docker-compose
    directory: /deploy
    schedule:
      interval: weekly
    labels:
      - enhancement
      - security
