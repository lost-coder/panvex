name: Bug Report
description: Report a bug in Panvex
labels: [bug, needs-triage]
body:
  - type: input
    id: panvex-version
    attributes:
      label: Panvex Version
      placeholder: "v1.0.0"
    validations:
      required: true
  - type: input
    id: telemt-version
    attributes:
      label: Telemt Version
      placeholder: "v2.0.0"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Panel
        - Agent
        - Web UI
        - Deploy
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS & Environment
      placeholder: "Ubuntu 22.04 / Docker 24.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
    validations:
      required: false
