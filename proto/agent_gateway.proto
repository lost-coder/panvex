syntax = "proto3";

package panvex.gateway.v1;

option go_package = "github.com/panvex/panvex/internal/gatewayrpc";

service AgentGateway {
  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse);
  rpc Connect(stream ConnectClientMessage) returns (stream ConnectServerMessage);
}

message RenewCertificateRequest {
  string agent_id = 1;
}

message RenewCertificateResponse {
  string certificate_pem = 1;
  string private_key_pem = 2;
  string ca_pem = 3;
  int64 expires_at_unix = 4;
}

message Heartbeat {
  string agent_id = 1;
  string node_name = 2;
  string fleet_group_id = 4;
  string version = 5;
  bool read_only = 6;
  int64 observed_at_unix = 7;
}

message InstanceSnapshot {
  string id = 1;
  string name = 2;
  string version = 3;
  string config_fingerprint = 4;
  int32 connected_users = 5;
  bool read_only = 6;
}

message ClientUsageSnapshot {
  string client_id = 1;
  uint64 traffic_delta_bytes = 2;
  int32 unique_ips_used = 3;
  int32 active_tcp_conns = 4;
  int32 active_unique_ips = 5;
}

message ClientIPSnapshot {
  string client_id = 1;
  repeated string active_ips = 2;
}

message RuntimeDCSnapshot {
  int32 dc = 1;
  int32 available_endpoints = 2;
  double available_pct = 3;
  int32 required_writers = 4;
  int32 alive_writers = 5;
  double coverage_pct = 6;
  double rtt_ms = 7;
  int32 load = 8;
}

message RuntimeUpstreamRowSnapshot {
  int32 upstream_id = 1;
  string route_kind = 2;
  string address = 3;
  bool healthy = 4;
  int32 fails = 5;
  double effective_latency_ms = 6;
}

message RuntimeUpstreamSnapshot {
  int32 configured_total = 1;
  int32 healthy_total = 2;
  int32 unhealthy_total = 3;
  int32 direct_total = 4;
  int32 socks5_total = 5;
  repeated RuntimeUpstreamRowSnapshot rows = 6;
}

message RuntimeEventSnapshot {
  uint64 sequence = 1;
  int64 timestamp_unix = 2;
  string event_type = 3;
  string context = 4;
}

message RuntimeSystemLoadSnapshot {
  double cpu_usage_pct = 1;
  uint64 memory_used_bytes = 2;
  uint64 memory_total_bytes = 3;
  double memory_usage_pct = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  double disk_usage_pct = 7;
  double load_1m = 8;
  double load_5m = 9;
  double load_15m = 10;
}

message AggregatedSystemLoad {
  double cpu_pct_avg = 1;
  double cpu_pct_max = 2;
  double mem_pct_avg = 3;
  double mem_pct_max = 4;
  double disk_pct_avg = 5;
  double disk_pct_max = 6;
  double load_1m = 7;
  double load_5m = 8;
  double load_15m = 9;
}

message AggregatedConnections {
  int32 connections_avg = 1;
  int32 connections_max = 2;
  int32 connections_me_avg = 3;
  int32 connections_direct_avg = 4;
  int32 active_users_avg = 5;
  int32 active_users_max = 6;
}

message AggregatedDCHealth {
  int32 dc = 1;
  double coverage_pct_avg = 2;
  double coverage_pct_min = 3;
  double rtt_ms_avg = 4;
  double rtt_ms_max = 5;
  int32 alive_writers_min = 6;
  int32 required_writers = 7;
  int32 load_max = 8;
}

message RuntimeSnapshot {
  bool accepting_new_connections = 1;
  bool me_runtime_ready = 2;
  bool me2dc_fallback_enabled = 3;
  bool use_middle_proxy = 4;
  string startup_status = 5;
  string startup_stage = 6;
  double startup_progress_pct = 7;
  string initialization_status = 8;
  bool degraded = 9;
  string initialization_stage = 10;
  double initialization_progress_pct = 11;
  string transport_mode = 12;
  int32 current_connections = 13;
  int32 current_connections_me = 14;
  int32 current_connections_direct = 15;
  int32 active_users = 16;
  uint64 connections_total = 17;
  uint64 connections_bad_total = 18;
  uint64 handshake_timeouts_total = 19;
  int32 configured_users = 20;
  repeated RuntimeDCSnapshot dcs = 21;
  RuntimeUpstreamSnapshot upstreams = 22;
  repeated RuntimeEventSnapshot recent_events = 23;
  double uptime_seconds = 24;
  RuntimeSystemLoadSnapshot system_load = 25;
  AggregatedSystemLoad aggregated_system_load = 26;
  AggregatedConnections aggregated_connections = 27;
  repeated AggregatedDCHealth aggregated_dcs = 28;
  int32 aggregation_samples = 29;
}

message RuntimeDiagnosticsSnapshot {
  string state = 1;
  string state_reason = 2;
  string system_info_json = 3;
  string effective_limits_json = 4;
  string security_posture_json = 5;
  string minimal_all_json = 6;
  string me_pool_json = 7;
  string dcs_json = 8;
}

message RuntimeSecurityInventorySnapshot {
  string state = 1;
  string state_reason = 2;
  bool enabled = 3;
  int32 entries_total = 4;
  string entries_json = 5;
}

message Snapshot {
  string agent_id = 1;
  string node_name = 2;
  string fleet_group_id = 4;
  string version = 5;
  bool read_only = 6;
  int64 observed_at_unix = 7;
  repeated InstanceSnapshot instances = 8;
  map<string, uint64> metrics = 9;
  repeated ClientUsageSnapshot clients = 10;
  RuntimeSnapshot runtime = 11;
  repeated ClientIPSnapshot client_ips = 12;
  int32 total_active_connections = 13;
  int32 total_active_users = 14;
  bool has_client_usage = 15;
  bool has_client_ips = 16;
  RuntimeDiagnosticsSnapshot runtime_diagnostics = 17;
  RuntimeSecurityInventorySnapshot runtime_security_inventory = 18;
}

message JobResult {
  string agent_id = 1;
  string job_id = 2;
  bool success = 3;
  string message = 4;
  int64 observed_at_unix = 5;
  string result_json = 6;
}

message JobAcknowledgement {
  string agent_id = 1;
  string job_id = 2;
  int64 observed_at_unix = 3;
}

message JobCommand {
  string id = 1;
  string action = 2;
  string idempotency_key = 3;
  repeated string target_agent_ids = 4;
  string payload_json = 5;
}

message ClientDataRequest {
  enum RequestType {
    SINGLE_CLIENT = 0;
    FULL_SNAPSHOT = 1;
  }
  RequestType type = 1;
  string client_name = 2;
  string request_id = 3;
}

message ClientDataResponse {
  string request_id = 1;
  repeated ClientDetailRecord clients = 2;
}

message ClientDetailRecord {
  string client_id = 1;
  string client_name = 2;
  uint64 total_octets = 3;
  int32 current_connections = 4;
  int32 active_unique_ips = 5;
  repeated string active_ip_list = 6;
  string connection_link = 7;
  int32 max_tcp_conns = 8;
  string expiration = 9;
  uint64 data_quota_bytes = 10;
  int32 max_unique_ips = 11;
  string secret = 12;
  string user_ad_tag = 13;
  bool enabled = 14;
}

message ConnectClientMessage {
  oneof body {
    Heartbeat heartbeat = 1;
    Snapshot snapshot = 2;
    JobResult job_result = 3;
    JobAcknowledgement job_acknowledgement = 4;
    ClientDataResponse client_data_response = 5;
  }
}

message ConnectServerMessage {
  oneof body {
    JobCommand job = 1;
    ClientDataRequest client_data_request = 2;
  }
}
