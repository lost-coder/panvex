syntax = "proto3";

package panvex.gateway.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/lost-coder/panvex/internal/gatewayrpc";

service AgentGateway {
  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse);
  rpc Connect(stream ConnectClientMessage) returns (stream ConnectServerMessage);
  rpc EnrollOutbound(stream EnrollClientMessage) returns (stream EnrollServerMessage);
  rpc ReportEnrollmentSteps(ReportEnrollmentStepsRequest) returns (ReportEnrollmentStepsResponse);
}

message RenewCertificateRequest {
  string agent_id = 1;
}

message RenewCertificateResponse {
  string certificate_pem = 1;
  string private_key_pem = 2;
  string ca_pem = 3;
  int64 expires_at_unix = 4;
}

message Heartbeat {
  string agent_id = 1;
  string node_name = 2;
  reserved 3; // was removed in early development
  string fleet_group_id = 4;
  string version = 5;
  bool read_only = 6;
  int64 observed_at_unix = 7;
}

message InstanceSnapshot {
  string id = 1;
  string name = 2;
  string version = 3;
  string config_fingerprint = 4;
  int32 connected_users = 5;
  bool read_only = 6;
}

message ClientUsageSnapshot {
  string client_id = 1;
  uint64 traffic_delta_bytes = 2;
  int32 unique_ips_used = 3;
  int32 active_tcp_conns = 4;
  int32 active_unique_ips = 5;
  string client_name = 6;
  // Monotonic per-agent sequence number. Starts at 1 on agent boot and
  // increments with every snapshot emitted by the agent. The control-plane
  // uses it to dedup retried/duplicate deltas and to detect restarts
  // (seq resets to 1). See P2-LOG-06 / L-07.
  uint64 seq = 7;
  uint64 quota_used_bytes = 8;
  uint64 quota_last_reset_unix = 9;
}

message ClientIPSnapshot {
  string client_id = 1;
  repeated string active_ips = 2;
  string client_name = 3;
}

message RuntimeMeWritersSummary {
  int32 configured_endpoints = 1;
  int32 available_endpoints = 2;
  double coverage_pct = 3;
  int32 fresh_alive_writers = 4;
  double fresh_coverage_pct = 5;
  int32 required_writers = 6;
  int32 alive_writers = 7;
}

message RuntimeDCSnapshot {
  int32 dc = 1;
  int32 available_endpoints = 2;
  double available_pct = 3;
  int32 required_writers = 4;
  int32 alive_writers = 5;
  double coverage_pct = 6;
  double rtt_ms = 7;
  int32 load = 8;
  int32 fresh_alive_writers = 9;
  double fresh_coverage_pct = 10;
}

message RuntimeUpstreamRowSnapshot {
  int32 upstream_id = 1;
  string route_kind = 2;
  string address = 3;
  bool healthy = 4;
  int32 fails = 5;
  double effective_latency_ms = 6;
  int32 weight = 7;
  int32 last_check_age_secs = 8;
  repeated string scopes = 9;
}

message RuntimeUpstreamSnapshot {
  int32 configured_total = 1;
  int32 healthy_total = 2;
  int32 unhealthy_total = 3;
  int32 direct_total = 4;
  int32 socks5_total = 5;
  repeated RuntimeUpstreamRowSnapshot rows = 6;

  // Direct-mode signals — populated by agent metrics_parser + upstream_rate.
  // fail_rate_known=false when the agent does not yet have enough samples
  // (cold start, post-reset, or stale-window) and the control-plane should
  // skip rate-based severity rules.
  double fail_rate_pct_5m         = 7;
  bool   fail_rate_known          = 8;
  uint64 connect_attempt_total    = 9;
  uint64 connect_success_total    = 10;
  uint64 connect_fail_total       = 11;
  uint64 connect_failfast_total   = 12;

  // Route-kind totals introduced in Telemt 3.4.7 (`UpstreamSummaryData`).
  // socks4_total and shadowsocks_total were exposed before Panvex picked
  // them up — agents on Telemt ≥ 3.4.7 fill these in; older Telemt and
  // older agents leave them at zero, which is also the JSON default
  // surfaced on the panel.
  int32 socks4_total              = 13;
  int32 shadowsocks_total         = 14;
}

message RuntimeEventSnapshot {
  uint64 sequence = 1;
  int64 timestamp_unix = 2;
  string event_type = 3;
  string context = 4;
}

message RuntimeSystemLoadSnapshot {
  double cpu_usage_pct = 1;
  uint64 memory_used_bytes = 2;
  uint64 memory_total_bytes = 3;
  double memory_usage_pct = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  double disk_usage_pct = 7;
  double load_1m = 8;
  double load_5m = 9;
  double load_15m = 10;
  uint64 net_bytes_sent = 11;
  uint64 net_bytes_recv = 12;
}

message AggregatedSystemLoad {
  double cpu_pct_avg = 1;
  double cpu_pct_max = 2;
  double mem_pct_avg = 3;
  double mem_pct_max = 4;
  double disk_pct_avg = 5;
  double disk_pct_max = 6;
  double load_1m = 7;
  double load_5m = 8;
  double load_15m = 9;
  uint64 net_bytes_sent = 10;
  uint64 net_bytes_recv = 11;
}

message AggregatedConnections {
  int32 connections_avg = 1;
  int32 connections_max = 2;
  int32 connections_me_avg = 3;
  int32 connections_direct_avg = 4;
  int32 active_users_avg = 5;
  int32 active_users_max = 6;
}

message AggregatedDCHealth {
  int32 dc = 1;
  double coverage_pct_avg = 2;
  double coverage_pct_min = 3;
  double rtt_ms_avg = 4;
  double rtt_ms_max = 5;
  int32 alive_writers_min = 6;
  int32 required_writers = 7;
  int32 load_max = 8;
}

message RuntimeSnapshot {
  bool accepting_new_connections = 1;
  bool me_runtime_ready = 2;
  bool me2dc_fallback_enabled = 3;
  bool use_middle_proxy = 4;
  string startup_status = 5;
  string startup_stage = 6;
  double startup_progress_pct = 7;
  string initialization_status = 8;
  bool degraded = 9;
  string initialization_stage = 10;
  double initialization_progress_pct = 11;
  string transport_mode = 12;
  int32 current_connections = 13;
  int32 current_connections_me = 14;
  int32 current_connections_direct = 15;
  int32 active_users = 16;
  uint64 connections_total = 17;
  uint64 connections_bad_total = 18;
  uint64 handshake_timeouts_total = 19;
  int32 configured_users = 20;
  repeated RuntimeDCSnapshot dcs = 21;
  RuntimeUpstreamSnapshot upstreams = 22;
  repeated RuntimeEventSnapshot recent_events = 23;
  double uptime_seconds = 24;
  RuntimeSystemLoadSnapshot system_load = 25;
  AggregatedSystemLoad aggregated_system_load = 26;
  AggregatedConnections aggregated_connections = 27;
  repeated AggregatedDCHealth aggregated_dcs = 28;
  int32 aggregation_samples = 29;
  RuntimeMeWritersSummary me_writers_summary = 30;
  bool reroute_active = 31;
  string route_mode = 32;
  bool me2dc_fast_enabled = 33;
  bool stale_cache_used = 34;
  repeated ConnectionTopEntry top_by_connections = 35;
  repeated ConnectionTopEntry top_by_throughput = 36;
  // Reachability of local Telemt API as observed by the agent. The agent
  // sets telemt_unreachable=true (with telemt_unreachable_since_unix
  // populated) once it has been failing to reach Telemt for ≥30s. The panel
  // uses the flag to surface a "Telemt API unreachable" critical severity
  // instead of mis-classifying the node as Direct from zero gates.
  //
  // Semantic is inverted (unreachable=true is the bad state) so the proto3
  // default of false correctly represents the healthy/reachable case.
  bool  telemt_unreachable            = 37;
  int64 telemt_unreachable_since_unix = 38;

  // Classified counters introduced in Telemt 3.4.10 (`SummaryData`).
  // `class` is a free-form string (Telemt uses a DashMap with static
  // labels), with documented values including:
  //   - `unknown_tls_sni`
  //   - `expected_64_got_0_unexpected_eof` (and `_connection_reset`,
  //     `_connection_aborted`, `_broken_pipe`, `_not_connected`)
  //   - `other`
  // The list is open: agents must not enforce a known-class set so a
  // newer Telemt can add classes without an agent or panel upgrade.
  repeated ConnectionsClassCount connections_bad_by_class    = 39;
  repeated ConnectionsClassCount handshake_failures_by_class = 40;
}

// ConnectionsClassCount carries a single (class, total) row from
// Telemt's `connections_bad_by_class` / `handshake_failures_by_class`
// arrays in `/v1/stats/summary`.
message ConnectionsClassCount {
  string class = 1;
  uint64 total = 2;
}

message ConnectionTopEntry {
  string username = 1;
  int32 connections = 2;
  uint64 throughput_bytes = 3;
}

message RuntimeDiagnosticsSnapshot {
  string state = 1;
  string state_reason = 2;
  string system_info_json = 3;
  string effective_limits_json = 4;
  string security_posture_json = 5;
  string minimal_all_json = 6;
  string me_pool_json = 7;
  string dcs_json = 8;
}

message RuntimeSecurityInventorySnapshot {
  string state = 1;
  string state_reason = 2;
  bool enabled = 3;
  int32 entries_total = 4;
  string entries_json = 5;
}

message Snapshot {
  string agent_id = 1;
  string node_name = 2;
  string fleet_group_id = 4;
  string version = 5;
  bool read_only = 6;
  int64 observed_at_unix = 7;
  repeated InstanceSnapshot instances = 8;
  map<string, uint64> metrics = 9;
  repeated ClientUsageSnapshot clients = 10;
  RuntimeSnapshot runtime = 11;
  repeated ClientIPSnapshot client_ips = 12;
  int32 total_active_connections = 13;
  int32 total_active_users = 14;
  bool has_client_usage = 15;
  bool has_client_ips = 16;
  RuntimeDiagnosticsSnapshot runtime_diagnostics = 17;
  RuntimeSecurityInventorySnapshot runtime_security_inventory = 18;
}

message JobResult {
  string agent_id = 1;
  string job_id = 2;
  bool success = 3;
  string message = 4;
  int64 observed_at_unix = 5;
  string result_json = 6;
}

message JobAcknowledgement {
  string agent_id = 1;
  string job_id = 2;
  int64 observed_at_unix = 3;
}

message JobCommand {
  string id = 1;
  string action = 2;
  string idempotency_key = 3;
  repeated string target_agent_ids = 4;
  string payload_json = 5;
}

message ClientDataRequest {
  enum RequestType {
    SINGLE_CLIENT = 0;
    FULL_SNAPSHOT = 1;
  }
  RequestType type = 1;
  string client_name = 2;
  string request_id = 3;
}

message ClientDataResponse {
  string request_id = 1;
  repeated ClientDetailRecord clients = 2;
}

message ClientDetailRecord {
  string client_id = 1;
  string client_name = 2;
  uint64 total_octets = 3;
  int32 current_connections = 4;
  int32 active_unique_ips = 5;
  repeated string active_ip_list = 6;
  repeated string connection_links = 7;
  int32 max_tcp_conns = 8;
  string expiration = 9;
  uint64 data_quota_bytes = 10;
  int32 max_unique_ips = 11;
  string secret = 12;
  string user_ad_tag = 13;
  bool enabled = 14;
}

// RenewalRequest is sent by the agent over the established Connect stream
// when its current cert is within the renewal window. The agent generated
// a fresh keypair locally; this CSR carries the new public key bound to
// the agent's existing CN.
message RenewalRequest {
  string agent_id = 1;
  string csr_pem = 2;
}

// RenewalResponse is the panel's reply. The agent must validate the cert
// pairs with the keypair it just generated before persisting.
message RenewalResponse {
  string certificate_pem = 1;
  string ca_pem = 2;
  int64 expires_at_unix = 3;
  // error, if non-empty, describes why the renewal was rejected. The
  // agent should log + back off and retry later.
  string error = 4;
}

message ConnectClientMessage {
  oneof body {
    Heartbeat heartbeat = 1;
    Snapshot snapshot = 2;
    JobResult job_result = 3;
    JobAcknowledgement job_acknowledgement = 4;
    ClientDataResponse client_data_response = 5;
    RenewalRequest renewal_request = 6;
    RuntimeEventsBatch runtime_events = 7;
  }
}

// AgentRuntimeEvent is a single slog-derived record shipped from the
// agent to the panel for the live "Recent events" UI section.
message AgentRuntimeEvent {
  google.protobuf.Timestamp ts = 1;
  string level = 2;             // "info" | "warn" | "error"
  string message = 3;
  map<string, string> fields = 4;
}

// RuntimeEventsBatch is a one-shot batch sent inside ConnectClientMessage.
message RuntimeEventsBatch {
  string agent_id = 1;
  repeated AgentRuntimeEvent events = 2;
}

message ConnectServerMessage {
  oneof body {
    JobCommand job = 1;
    ClientDataRequest client_data_request = 2;
    RenewalResponse renewal_response = 3;
  }
}

// EnrollOutbound messages — panel-speaks-first bootstrap exchange.
// The agent opens the stream; the panel waits for an EnrollOpening, then
// responds with an EnrollCertificate and closes its send-half.

// EnrollClientMessage is sent by the gRPC client (panel) to the gRPC server
// (agent). The panel responds with the signed certificate after receiving the
// agent's opening.
message EnrollClientMessage {
  oneof body {
    EnrollCertificate certificate = 1;
  }
}

message EnrollCertificate {
  string certificate_pem = 1;
  string ca_pem = 2;
  int64 expires_at_unix = 3;
}

// EnrollServerMessage is sent by the gRPC server (agent) to the gRPC client
// (panel). The agent sends its bootstrap opening first.
message EnrollServerMessage {
  oneof body {
    EnrollOpening opening = 1;
  }
}

message EnrollOpening {
  string bootstrap_token = 1;
  string agent_id = 2;
  string csr_pem = 3;
}

// AgentEnrollmentEvent is one step recorded locally on the agent during the
// inbound bootstrap flow (e.g. agent_persisted_cert, gateway_dialed,
// tls_handshake_ok). The agent batches these and ships them to the panel via
// ReportEnrollmentSteps once the first sync is up so the panel's timeline
// captures the agent-side stages it cannot otherwise observe.
message AgentEnrollmentEvent {
  string step = 1;
  google.protobuf.Timestamp ts = 2;
  string level = 3;
  string message = 4;
  map<string, string> fields = 5;
}

message ReportEnrollmentStepsRequest {
  string attempt_id = 1;
  repeated AgentEnrollmentEvent events = 2;
}

message ReportEnrollmentStepsResponse {}
