version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose     # http.Response.Body must be closed (leak guard)
    - contextcheck  # context.Background() in code that received a ctx
    - errcheck
    - errorlint     # %v→%w on errors, missing errors.Is/As, type-assert on err
    - govet
    - noctx         # http.Request without context (forces ctx-aware Do)
    - rowserrcheck  # sql.Rows.Err() must be checked after iteration
    - sqlclosecheck # sql.Rows / sql.Stmt must be Closed
    - staticcheck
    - gocritic
    - gosec
    - misspell
    - unconvert
  settings:
    gosec:
      # No global excludes — historical blanket gosec excludes hid real
      # findings. Per-rule false-positive suppressions live in
      # `exclusions.rules` below, scoped by `path:` to the files that
      # genuinely need them. New gosec hits should either be fixed in
      # code or get an explicit path-scoped entry with a comment.
      excludes: []
  exclusions:
    # protoc-gen-go output and other regenerated trees should never gate
    # the build: lint/style noise there reflects upstream codegen, not
    # author intent. Generated headers live in the files themselves; we
    # also list paths explicitly so the directories don't need re-marking
    # whenever a generator adds a file.
    paths:
      - "internal/gatewayrpc"
      - "internal/dbsqlc"
      # openapi/ holds oapi-codegen generated stubs; same exclusion
      # rationale as the two above. Source of truth: openapi/panvex.yaml.
      - "openapi"
    rules:
      - linters:
          - errcheck
        text: "Error return value of.*Close.*is not checked"
      - linters:
          - errcheck
        text: "tx.Rollback"
      - linters:
          - errcheck
        text: "conn.CloseNow"
      - linters:
          - unused
        text: "func.*is unused"
      - linters:
          - staticcheck
        text: "S1016"
      - linters:
          - gocritic
        text: "ifElseChain"
      - linters:
          - govet
        text: "lostcancel"
      # Phase-3 audit verification (PARTIAL #3): every gosec false-
      # positive is path-scoped here so a real new finding in a
      # different file is no longer hidden by a global ignore.

      # G101 — hardcoded credentials. All hits are PEM/secret literals
      # baked into test fixtures, env-var name constants whose value
      # *contains* the substring "PASSWORD"/"TOKEN", or static header
      # names like X-CSRF-Token.
      - linters: [gosec]
        text: "G101"
        path: "_test\\.go$"
      - linters: [gosec]
        text: "G101"
        path: "internal/controlplane/config/panel.go"
      - linters: [gosec]
        text: "G101"
        path: "internal/controlplane/server/csrf_token.go"
      - linters: [gosec]
        text: "G101"
        path: "internal/controlplane/storage/storagetest/store_contract.go"
      # csrf.go: TokenHeader = "X-CSRF-Token" (HTTP header name) and
      # secretStoreKey = "csrf_secret_v1" (cp_secrets row identifier)
      # are identifier strings, not credentials.
      - linters: [gosec]
        text: "G101"
        path: "internal/controlplane/csrf/csrf.go"

      # G104 — unchecked error returns. The general errcheck linter
      # already catches these with finer-grained policies; keep gosec
      # quiet on the few legitimate cleanup / dual-driver fallback
      # paths it still flags.
      - linters: [gosec]
        text: "G104"
        path: "internal/controlplane/storage/postgres/store.go"
      - linters: [gosec]
        text: "G104"
        path: "internal/controlplane/storage/postgres/migrate_test.go"
      - linters: [gosec]
        text: "G104"
        path: "internal/agent/updater/updater.go"
      - linters: [gosec]
        text: "G104"
        path: "internal/controlplane/server/http_updates.go"
      - linters: [gosec]
        text: "G104"
        path: "internal/controlplane/updates/download.go"
      - linters: [gosec]
        text: "G104"
        path: "internal/controlplane/storage/sqlite/store.go"
      - linters: [gosec]
        text: "G104"
        path: "_test\\.go$"

      # G115 — int conversion overflow. Pervasive in code that
      # marshals counters or Telemt-supplied limits between Go's int
      # families and DB BIGINT/INT4 columns; bound-checking each
      # would not catch the real (impossible-in-practice) overflow.
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/server/http_auth.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/agent/runtime/agent.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/agent/runtime/ring_buffer.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/auth/service.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/server/clients_discovery.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/server/telemetry_runtime.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/server/chaos_test.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/storage/postgres/clients.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/storage/postgres/telemetry.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/storage/sqlite/clients.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/storage/sqlite/telemetry.go"
      # P-1 (sprint S-23 perf-critical): bulk variants flatten the same
      # uint64 traffic / last_seq counters as their single-row siblings in
      # clients.go — re-using the same exclusion semantics.
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/storage/postgres/bulk.go"
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/storage/sqlite/bulk.go"

      # G117 — JSON tag matches secret pattern. clients_flow returns
      # the rotated client secret in the API response on purpose.
      - linters: [gosec]
        text: "G117"
        path: "internal/controlplane/server/clients_flow.go"

      # G301 — directory permissions. Operator-controlled config
      # directories (state/data/sqlite parent) need 0755 so the
      # operator can ls; the contained files are 0600.
      - linters: [gosec]
        text: "G301"
        path: "internal/controlplane/state/users_file.go"
      - linters: [gosec]
        text: "G301"
        path: "internal/controlplane/storage/sqlite/store.go"
      - linters: [gosec]
        text: "G301"
        path: "internal/controlplane/config/panel_test.go"

      # G304 — file inclusion via variable. The agent/updater opens
      # paths it just created via os.CreateTemp; agent/state and
      # state/users_file open operator-configured paths; tests mint
      # paths inside t.TempDir.
      - linters: [gosec]
        text: "G304"
        path: "internal/agent/state/credentials.go"
      - linters: [gosec]
        text: "G304"
        path: "internal/agent/updater/updater.go"
      - linters: [gosec]
        text: "G304"
        path: "internal/controlplane/state/users_file.go"
      - linters: [gosec]
        text: "G304"
        path: "internal/agent/telemt/config_reader.go"
      - linters: [gosec]
        text: "G304"
        path: "internal/controlplane/updates/download.go"
      - linters: [gosec]
        text: "G304"
        path: "cmd/control-plane/main.go"
      - linters: [gosec]
        text: "G304"
        path: "_test\\.go$"

      # G505 — SHA-1 import. auth/service uses SHA-1 as part of an
      # HMAC primitive (HMAC-SHA1 is a different beast from raw
      # SHA-1 collision concerns); annotated in code.
      - linters: [gosec]
        text: "G505"
        path: "internal/controlplane/auth/service.go"

      # G602 — slice index OOB. Both sites guard the slice length
      # immediately above gosec's static analyser; false positives.
      - linters: [gosec]
        text: "G602"
        path: "internal/controlplane/jobs/service.go"
      - linters: [gosec]
        text: "G602"
        path: "internal/controlplane/updates/release.go"

      # G706 — log injection via taint. main.go logs an operator-
      # supplied flag value; slog escapes control bytes already.
      - linters: [gosec]
        text: "G706"
        path: "cmd/control-plane/main.go"
      # otel.go: logs OTEL_EXPORTER_OTLP_ENDPOINT (operator env var)
      # via slog.Warn with a structured field; control bytes are
      # escaped automatically by the text handler.
      - linters: [gosec]
        text: "G706"
        path: "cmd/control-plane/otel.go"
      # server_lifecycle.go: logs the operator-configured HTTP listen
      # address via slog.Info structured field.
      - linters: [gosec]
        text: "G706"
        path: "cmd/control-plane/server_lifecycle.go"

      # G115 — int conversion overflow, additional paths.
      # diagnose.go: host.Uptime() returns uint64 seconds; time.Duration
      # is int64 nanoseconds. 2^63 ns ≈ 292 years, so the conversion
      # cannot overflow on any plausible host uptime.
      - linters: [gosec]
        text: "G115"
        path: "cmd/control-plane/diagnose.go"
      # bootstrap_admin.go: int(os.Stdin.Fd()) — fd is a small kernel
      # handle, never overflows int.
      - linters: [gosec]
        text: "G115"
        path: "cmd/control-plane/bootstrap_admin.go"
      # upstream_rate.go: uint64 telemetry counters → int64 for proto
      # wire types; counters are bounded by the agent's per-interval
      # sampling window.
      - linters: [gosec]
        text: "G115"
        path: "internal/agent/telemt/upstream_rate.go"
      # auth/password.go: uint32(len(expected)) — expected is the
      # argon2 hash output, always 32 bytes.
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/auth/password.go"
      # auth/totp.go: uint64(timestep) — RFC 6238 timesteps are
      # bounded to TOTP epoch ranges, no overflow possible.
      - linters: [gosec]
        text: "G115"
        path: "internal/controlplane/auth/totp.go"
      # Test fixtures cast small loop counters (e.g. writer*1000 + i)
      # to uint64 to fill protobuf counter fields; values are
      # explicitly bounded by the test loop.
      - linters: [gosec]
        text: "G115"
        path: "_test\\.go$"

      # G117 — Marshaled struct field "Secret". clients_jobs.go is the
      # canonical job payload carrying the rotated client secret to
      # the agent; the JSON tag is intentional.
      - linters: [gosec]
        text: "G117"
        path: "internal/controlplane/server/clients_jobs.go"

      # G118 — context.CancelFunc not called. outbound.go stores the
      # supervisor cancel in supervisors[meta.NodeID].cancel and
      # invokes it from stopAll/removeSupervisor. Annotated in code
      # but gosec's static scan does not follow the assignment.
      - linters: [gosec]
        text: "G118"
        path: "internal/controlplane/agenttransport/outbound.go"

      # G201 — SQL string formatting. backup.go uses fmt.Sprintf to
      # build a VACUUM INTO statement against a tempdir path we own;
      # settings/dbstore.go interpolates placeholder tokens (`?` /
      # `$N`) only — values bind via ExecContext args.
      - linters: [gosec]
        text: "G201"
        path: "cmd/control-plane/backup.go"
      - linters: [gosec]
        text: "G201"
        path: "internal/controlplane/settings/dbstore.go"

      # G202 — SQL string concatenation. explain_test.go prepends
      # "EXPLAIN (FORMAT JSON, ANALYZE, BUFFERS) " to a test-fixture
      # query string; no user input.
      - linters: [gosec]
        text: "G202"
        path: "internal/controlplane/storage/postgres/explain_test.go"

      # G204 — subprocess launched with a variable. install_script
      # selfcheck tests exec the embedded install script from a path
      # written under t.TempDir.
      - linters: [gosec]
        text: "G204"
        path: "internal/controlplane/server/install_script_selfcheck_test.go"

      # G304 — file inclusion via variable, additional paths.
      # backup.go reads/writes archive paths from operator -out flag
      # (intended) and the tempdir snapshot path we own.
      - linters: [gosec]
        text: "G304"
        path: "cmd/control-plane/backup.go"
      # bootstrap_admin.go opens the operator-supplied password file
      # path; access to that path is governed by filesystem perms,
      # not by gosec's static taint analysis.
      - linters: [gosec]
        text: "G304"
        path: "cmd/control-plane/bootstrap_admin.go"
      - linters: [gosec]
        text: "G703"
        path: "cmd/control-plane/bootstrap_admin.go"

      # G306 — file permissions. install_script_selfcheck_test.go
      # writes the embedded script to a temp path with 0o755 so the
      # subprocess can exec it; the file lives under t.TempDir and is
      # removed by Cleanup.
      - linters: [gosec]
        text: "G306"
        path: "internal/controlplane/server/install_script_selfcheck_test.go"

      # G402 — TLS InsecureSkipVerify. bootstrap_reverse_test.go is a
      # panel-side test stub dialing the agent's self-signed listener;
      # production code uses the verified pinning verifier.
      - linters: [gosec]
        text: "G402"
        path: "cmd/agent/bootstrap_reverse_test.go"

      # G404 — math/rand for non-cryptographic backoff jitter.
      # agenttransport/outbound.go uses math/rand/v2 to add jitter to
      # reconnect timers — not security-sensitive.
      - linters: [gosec]
        text: "G404"
        path: "internal/controlplane/agenttransport/outbound.go"

      # G505 — SHA-1 import. auth/totp.go imports crypto/sha1 because
      # RFC 6238 (TOTP) mandates HMAC-SHA1 for Google Authenticator
      # / Authy / 1Password interop. SHA-1's collision weakness does
      # not affect HMAC-SHA1 within the TOTP construction.
      - linters: [gosec]
        text: "G505"
        path: "internal/controlplane/auth/totp.go"
