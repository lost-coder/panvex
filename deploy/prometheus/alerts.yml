# Panvex Prometheus alert rules.
#
# Load this file from your Prometheus config:
#
#   rule_files:
#     - /etc/prometheus/panvex-alerts.yml
#
# Thresholds are conservative starting points; tune per fleet size and SLO.

groups:
  - name: panvex.eventbus
    rules:
      # Event-bus drops mean a subscriber's channel is full. A steady trickle
      # is fine, but a sustained rate means the UI/dashboard is no longer
      # seeing real-time updates. Alert only when the rate exceeds a floor
      # for several minutes so transient bursts (e.g. a slow dashboard tab
      # briefly backgrounded) do not page operators.
      - alert: PanvexEventHubDropsSustained
        expr: rate(panvex_event_hub_drop_total[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Event-hub dropping events for slow subscribers"
          description: |
            The control-plane event hub has been dropping more than 0.5 events
            per second for 10 minutes. A subscriber (most likely a web
            dashboard with a stuck WebSocket) is not draining its buffer,
            which means live updates are being lost for that client.

            Investigate with:
              sum by (instance) (rate(panvex_event_hub_drop_total[5m]))
              panvex_event_hub_subscribers

      - alert: PanvexEventHubDropsSpike
        expr: rate(panvex_event_hub_drop_total[1m]) > 10
        for: 2m
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "Event-hub drop rate spiking"
          description: |
            The event hub is dropping more than 10 events per second. This
            usually indicates a disconnected or wedged subscriber consuming
            a slot without reading. Real-time UX is severely degraded.

  - name: panvex.batch_writer
    rules:
      # Persistent flush failures are never healthy: they mean audit events /
      # telemetry cannot be persisted. Page on any sustained occurrence.
      - alert: PanvexBatchFlushPersistent
        expr: increase(panvex_batch_flush_errors_total{error_type="persistent"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "Persistent batch-writer flush failure"
          description: |
            Batch buffer {{ $labels.buffer }} has been failing flushes with
            a persistent error class for 5+ minutes. Audit / telemetry data
            is being held in memory and at risk on graceful shutdown.

      # Queue depth climbing means writer can't keep up with ingestion.
      - alert: PanvexBatchQueueBacklog
        expr: panvex_batch_queue_depth > 5000
        for: 10m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Batch buffer backlog"
          description: |
            Batch buffer {{ $labels.buffer }} has exceeded 5000 queued rows
            for 10 minutes. DB is likely slow or misconfigured.

  - name: panvex.jobs
    rules:
      # Write-behind job persistence failures mean in-memory job state is
      # ahead of the database: a control-plane restart in this window loses
      # job/rollout progress. Any sustained occurrence is actionable.
      - alert: PanvexJobPersistFailures
        expr: increase(panvex_job_persist_failures_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "Job state is failing to persist"
          description: |
            The jobs service has failed to persist job/target updates for
            5 minutes (panvex_job_persist_failures_total is growing). The
            in-memory job state is ahead of storage; a restart now would
            lose rollout progress. Check DB health and control-plane logs
            for "persist latest job version failed".

  - name: panvex.auth
    rules:
      - alert: PanvexLockoutSurge
        expr: panvex_lockout_active > 5
        for: 5m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Multiple accounts locked out"
          description: |
            More than 5 accounts are currently in login lockout. Possible
            brute-force attempt or broken automation hammering the login
            endpoint.

  - name: panvex.presence
    rules:
      - alert: PanvexAgentFleetCollapse
        expr: panvex_agent_connected < (max_over_time(panvex_agent_connected[1h]) * 0.5)
        for: 5m
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "More than half the agent fleet disconnected"
          description: |
            Connected agent count dropped below 50% of the peak observed
            in the last hour for 5 minutes. Investigate network, DNS, or
            control-plane restart.

      # Complements PanvexAgentFleetCollapse (critical, 50% of the 1h
      # peak): a 20-49% loss never trips that rule. This one compares to
      # the 15m peak — drops of >20% within a quarter hour are abnormal
      # churn worth a look. The >=5 floor keeps single-agent dev fleets
      # from paging (1 of 4 agents restarting is a 25% "drop").
      - alert: PanvexFleetDropAbsolute
        expr: |
          (panvex_agent_connected < 0.8 * max_over_time(panvex_agent_connected[15m]))
          and (max_over_time(panvex_agent_connected[15m]) >= 5)
        for: 10m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Agent fleet shrank by >20% within 15 minutes"
          description: |
            Connected agents fell more than 20% below the 15-minute
            peak and stayed there for 10 minutes. Check recent panel
            restarts, network paths, and agent logs before this decays
            into PanvexAgentFleetCollapse.

  - name: panvex.updates
    rules:
      - alert: PanvexUnsignedUpdateFallback
        expr: increase(panvex_unsigned_update_fallback_total[1h]) > 0
        for: 1m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Unsigned update manifest used"
          description: |
            The panel update flow fell back to an unsigned manifest in the
            last hour. Verify the signing key is provisioned and reachable.

  - name: panvex.db_pool
    rules:
      # Sustained high pool utilisation means we're a heartbeat away from
      # `connection pool exhausted`. Threshold from the audit (>80% for 5m).
      - alert: PanvexDBPoolUtilizationHigh
        expr: |
          (panvex_db_pool_in_use_connections /
           on (instance) panvex_db_pool_max_open_connections)
          > 0.8
        for: 5m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "DB connection pool >80% in-use"
          description: |
            Pool utilisation exceeded 80% for 5 minutes. Either traffic
            spiked beyond what PANVEX_DB_MAX_OPEN_CONNS can absorb, or a
            slow query is parking connections. Check
            panvex_db_pool_wait_seconds_total and Postgres pg_stat_activity.

      # Goroutines waiting on the pool means we have already exhausted it.
      - alert: PanvexDBPoolWaiting
        expr: rate(panvex_db_pool_wait_seconds_total[1m]) > 0.5
        for: 2m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Goroutines waiting on DB pool"
          description: |
            Cumulative pool-wait time grew >0.5s per real second
            (averaged over 1m) for 2 minutes. Bump PANVEX_DB_MAX_OPEN_CONNS
            or look for slow queries.

  - name: panvex.ratelimit
    rules:
      # Rate-limit rejections per scope:
      #   login           → likely credential brute-force
      #   agent_bootstrap → enrollment-token storm or runaway agent
      #   sensitive       → operator account theft / TOTP brute-force
      #   grpc_connect    → flapping agent or DoS
      - alert: PanvexRateLimitRejectSurge
        expr: sum by (scope) (rate(panvex_ratelimit_rejected_total[1m])) > 1
        for: 5m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Rate-limit rejections sustained ({{ $labels.scope }})"
          description: |
            More than 1 reject/sec on the {{ $labels.scope }} scope for 5
            minutes. Cross-check the audit log + presence dashboards;
            consider tightening the per-scope limiter if the rate is
            legitimate sustained load.

  - name: panvex.batch_writer.audit
    rules:
      # Audit events that 200'd to the client are now being lost. Pages.
      - alert: PanvexBatchWriterAuditDropping
        expr: rate(panvex_batch_persist_errors_total{stream="audit_events", type="persistent"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "Audit events being dropped after retry exhaustion"
          description: |
            The batch_writer audit stream reports persistent failures for
            5 minutes. Check Postgres availability and the alert tag
            `audit_persist_failed` in slog.

  - name: panvex.runtime
    rules:
      # Q3.U-Q-15: any goroutine panic that the recover() handler caught
      # is a latent bug — the request/job continued, but the invariant
      # that crashed once will likely crash again. Page on first
      # occurrence so we get the stack trace from slog before logs roll.
      - alert: PanvexGoroutinePanicRecovered
        expr: increase(panvex_goroutine_panic_recovered_total[10m]) > 0
        for: 1m
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "Recovered goroutine panic ({{ $labels.goroutine }})"
          description: |
            A panic was recovered in goroutine {{ $labels.goroutine }} in
            the last 10 minutes. Recovery keeps the process alive but the
            failed work was abandoned and the underlying invariant is
            broken — find the stack trace in slog and fix the bug.

  - name: panvex.panel
    rules:
      # The panel is a single instance (no HA): if its scrape target is
      # down or the series is gone entirely, every other alert in this
      # file is blind. This rule assumes the scrape job is named
      # "panvex" — adjust the job label to match your prometheus.yml.
      - alert: PanvexPanelDown
        expr: up{job="panvex"} == 0 or absent(up{job="panvex"})
        for: 2m
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "Panvex control-plane is not being scraped"
          description: |
            The panel's /metrics target has been down (or absent from
            Prometheus) for 2 minutes. Agents may still be serving
            traffic, but the fleet is unobservable and unmanageable.

  - name: panvex.certificates
    rules:
      # All three expiry gauges report 0 until first sampled, hence the
      # `> 0` guards. Timestamps come from the Plan 6 cert-expiry gauges.
      - alert: PanvexCACertExpiringSoon
        expr: |
          panvex_ca_cert_expiry_timestamp_seconds > 0
          and (panvex_ca_cert_expiry_timestamp_seconds - time()) < 30 * 86400
        for: 1h
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Panel CA certificate expires in <30 days"
          description: |
            The embedded CA expires soon. The panel auto-regenerates an
            EXPIRED CA at startup, but that invalidates every issued
            agent certificate at once — plan a controlled rotation
            before expiry instead.

      - alert: PanvexCACertExpiryCritical
        expr: |
          panvex_ca_cert_expiry_timestamp_seconds > 0
          and (panvex_ca_cert_expiry_timestamp_seconds - time()) < 7 * 86400
        for: 1h
        labels:
          severity: critical
          component: control-plane
        annotations:
          summary: "Panel CA certificate expires in <7 days"
          description: |
            Imminent CA expiry. After expiry the panel mints a new CA
            and the whole fleet must re-enroll. Rotate now.

      - alert: PanvexServerCertExpiringSoon
        expr: |
          panvex_server_cert_expiry_timestamp_seconds > 0
          and (panvex_server_cert_expiry_timestamp_seconds - time()) < 14 * 86400
        for: 1h
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Panel gRPC server certificate expires in <14 days"
          description: |
            The serving cert is minted at startup with a 1y lifetime, so
            this firing usually means the panel process has been up for
            ~1 year. A restart re-mints it; schedule one.

      - alert: PanvexAgentCertExpiringSoon
        expr: |
          panvex_agent_cert_earliest_expiry_timestamp_seconds > 0
          and (panvex_agent_cert_earliest_expiry_timestamp_seconds - time()) < 7 * 86400
        for: 1h
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "An agent certificate expires in <7 days"
          description: |
            Agent certs live 30 days and renew automatically over gRPC;
            the earliest expiry across the fleet is now inside 7 days,
            which means at least one agent has failed to renew for ~3
            weeks (offline, or renewal is broken). Identify it via the
            fleet page (sort by cert expiry) before it falls off the CA.

  - name: panvex.jobs.execution
    rules:
      # Execution failures (job reached the failed terminal status), as
      # opposed to persistence failures (PanvexJobPersistFailures).
      - alert: PanvexJobFailureRateHigh
        expr: increase(panvex_job_failures_total[15m]) > 5
        for: 5m
        labels:
          severity: warning
          component: control-plane
        annotations:
          summary: "Job failures elevated"
          description: |
            More than 5 jobs entered the failed terminal status in the
            last 15 minutes. Singular failures are routine (an agent
            going offline mid-job), a burst usually means a broken
            config push or a wedged agent. Check the jobs page and
            panvex_job_queue_depth.
