map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Production deployments MUST terminate TLS in front of this block (ingress
# controller, upstream nginx, or a sidecar). This container itself speaks HTTP
# because the typical topology puts it behind a TLS-terminating reverse proxy.
# If you expose :80 directly to the internet, redirect to HTTPS instead:
#
#   server {
#     listen 80;
#     server_name your.host.example;
#     return 301 https://$host$request_uri;
#   }
#
# and add a :443 server block with ssl_certificate / ssl_certificate_key.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Defense-in-depth headers. The Go layer already emits these on API
  # responses; duplicating them here protects static assets (index.html,
  # chunks, fonts) which are served by nginx directly and never reach Go.
  # `always` makes nginx emit the header even on 4xx/5xx responses.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # HSTS. The documented topology terminates TLS upstream (see header
  # comment), so the header reaches browsers over HTTPS even though
  # this nginx speaks HTTP. `preload` is intentionally NOT set: it is
  # a one-way browser registration that requires hand-submission and
  # blocks plain-HTTP fall-back even on internal hosts. Add it
  # yourself after validating the full cert chain.
  #
  # If you EVER serve this stack over plain HTTP without an upstream
  # TLS terminator, comment this line out — pinning HSTS to a host
  # without HTTPS will lock browsers out until max-age expires.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # CSP for the static shell. Keep in sync with the Go control-plane CSP
  # (internal/controlplane/server middleware) so both the shell and API
  # responses enforce the same policy.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # Cap request body for static routes. API routes are capped by Go; this
  # stops absurd uploads from reaching the upstream at all.
  client_max_body_size 2m;

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    # Preserve browser Origin so the Go CSRF Origin-check sees the real value.
    proxy_set_header Origin $http_origin;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://backend:8080/api/;
  }

  # Long-lived, content-hashed assets: cache aggressively.
  location ~* \.(?:js|css|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # SPA fallback: index.html itself must not be cached so deploys take effect.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store" always;
  }

  # gzip for text-like content.
  gzip on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
  gzip_vary on;
}
