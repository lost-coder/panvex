# DEV-ONLY compose profile.
#
# SQLite + plaintext gRPC, persisted to a local volume. Convenient for laptop
# development; FATAL for any production deployment — there is no encryption-
# at-rest, no TLS termination, and no PANVEX_ENCRYPTION_KEY required by the
# backend. For real deployments use docker-compose.prod.yml, which mandates
# Postgres + sslmode=require + PANVEX_ENCRYPTION_KEY and binds the backend
# port to loopback only.
services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: control-plane
    command:
      - ./panvex-control-plane
      - -http-addr
      - :8080
      - -grpc-addr
      - :8443
      - -storage-driver
      - sqlite
      - -storage-dsn
      - /var/lib/panvex/panvex.db
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - panvex_sqlite_data:/var/lib/panvex
    # Must exceed cmd/control-plane controlPlaneShutdownGraceMin (45s) so
    # the audit-event drain finishes before docker sends SIGKILL.
    stop_grace_period: 45s

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: web
    depends_on:
      - backend
    # Bind UI to loopback only — the SQLite compose targets local /
    # laptop development. Exposing :80 on 0.0.0.0 leaves the panel open
    # to the public internet on a VPS until firewall/nginx is wired,
    # which is exactly the misconfiguration this default avoids.
    ports:
      - "127.0.0.1:8080:80"

  # One-shot first-run admin creation. Activate explicitly:
  #
  #   PANVEX_BOOTSTRAP_PASSWORD='<pw>' \
  #     docker compose -f deploy/docker-compose.sqlite.yml \
  #     --profile bootstrap run --rm bootstrap
  #
  # Override the username with PANVEX_BOOTSTRAP_USERNAME (default: admin).
  # Safe to re-run: the binary refuses to plant an admin on a non-empty
  # store (see runBootstrapAdmin in cmd/control-plane/main.go).
  #
  # SQLite note: stop the backend before bootstrapping a fresh DB to
  # avoid contending on the file. Once an admin exists this matters
  # less, but the first run should be sequential.
  bootstrap:
    profiles: [bootstrap]
    build:
      context: ..
      dockerfile: Dockerfile
      target: control-plane
    command:
      - ./panvex-control-plane
      - bootstrap-admin
      - -storage-driver
      - sqlite
      - -storage-dsn
      - /var/lib/panvex/panvex.db
      - -username
      - ${PANVEX_BOOTSTRAP_USERNAME:-admin}
    environment:
      PANVEX_BOOTSTRAP_PASSWORD: ${PANVEX_BOOTSTRAP_PASSWORD:?set PANVEX_BOOTSTRAP_PASSWORD before running --profile bootstrap}
    volumes:
      - panvex_sqlite_data:/var/lib/panvex
    restart: "no"

volumes:
  panvex_sqlite_data:
