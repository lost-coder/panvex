# Production compose profile.
#
# Differences from docker-compose.postgres.yml (dev):
#   - No defaults on POSTGRES_PASSWORD or PANVEX_ENCRYPTION_KEY: an
#     unset value fails the start instead of silently booting with a
#     well-known credential. Use the `${VAR:?...}` form below.
#   - Panel <-> Postgres traffic goes over a Unix domain socket, not TCP.
#     The typical deployment runs Postgres and the panel on one host;
#     rather than terminating TLS on a TCP listener (cert management) or
#     leaving plaintext TCP reachable by every container on the compose
#     network, postgres is started with `listen_addresses=''` (no TCP at
#     all) and shares its socket dir (/var/run/postgresql) with the
#     backend + bootstrap services via the panvex_pg_socket volume. The
#     DSN therefore uses `host=/var/run/postgresql` + `sslmode=disable`
#     (TLS over a local socket is pointless). Operators who put Postgres
#     on a separate host should re-enable a TCP listener, mount a server
#     cert (`-c ssl=on`), and switch the DSN to a host:port +
#     `sslmode=require`/`verify-full`.
#   - Memory + CPU limits keep one runaway component from starving the
#     host (and act as a baseline for K8s requests/limits later).
#   - stop_grace_period >= controlPlaneShutdownGraceMin (45s) so the
#     audit-event drain finishes before SIGKILL.
#   - Backend port binds to loopback only — terminate TLS at a reverse
#     proxy (deploy/nginx/default.conf) and never expose :8080 directly.
#
# TLS for the agent gRPC channel:
#   The control-plane mints its own server certificate at startup from
#   the embedded CA; agents authenticate with client certificates and
#   pin the CA SPKI. The channel is self-secured, so :8443 is published
#   directly (no reverse proxy in front). Operators are responsible for
#   distributing the CA bundle to agents (see deploy/install.sh) and for
#   firewalling 8443 to agent networks. Alternative single-IP topology:
#   deploy/networking.md.
#
# First-time bootstrap:
#   POSTGRES_PASSWORD=... PANVEX_ENCRYPTION_KEY=... \
#     docker compose -f docker-compose.prod.yml up -d
#
# Without those env vars the stack refuses to come up — by design.

# Shared log driver: the default json-file driver grows unbounded and
# fills the host disk on long-running deployments. Cap at ~150 MiB per
# service (10 × 15m).
#
# NOTE: this block is intentionally inlined into every service below
# rather than factored into a `&default-logging` YAML anchor. Docker
# Compose handles anchors fine, but the Dependabot docker-compose
# parser (Psych.safe_load) chokes on aliases and fails the whole
# /deploy scan — see .github/dependabot.yml. Keep these four copies in
# sync by hand; do NOT re-introduce an anchor.

services:
  postgres:
    # The Dependabot docker-compose ecosystem in /deploy (see
    # .github/dependabot.yml) opens a PR with the `@sha256:...` digest
    # whenever the upstream tag moves. Operators rolling out manually
    # should pin the digest here too:
    #     image: postgres:16-alpine@sha256:<...>
    # `docker pull postgres:16-alpine` then `docker inspect ... |
    # jq -r '.[].RepoDigests'` returns the SHA to copy in.
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-panvex}
      POSTGRES_USER: ${POSTGRES_USER:-panvex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for the prod profile}
    # listen_addresses='' disables the TCP listener entirely — the panel
    # reaches Postgres only through the shared Unix socket, so the DB has
    # zero network attack surface. unix_socket_directories is pinned so
    # the socket path is deterministic (independent of the image's
    # compiled default) for both the healthcheck and the backend DSN.
    # Args start with `-`, so the image entrypoint prepends `postgres`.
    command:
      - "-c"
      - "listen_addresses="
      - "-c"
      - "unix_socket_directories=/var/run/postgresql"
    healthcheck:
      # -h points pg_isready at the pinned socket dir; with TCP disabled
      # the default localhost probe would never succeed.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panvex} -d ${POSTGRES_DB:-panvex} -h /var/run/postgresql"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # postgres:18+ images store data under /var/lib/postgresql (the
      # pg_ctlcluster-compatible layout) and refuse to start when a fresh
      # volume is mounted at the legacy .../data path.
      - panvex_postgres_data:/var/lib/postgresql
      # Socket dir shared with backend + bootstrap. The image entrypoint
      # (running as root) chowns it to the postgres user on startup.
      - panvex_pg_socket:/var/run/postgresql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "10"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: control-plane
    env_file:
      - path: .env
        required: false
    environment:
      # Switches server-side checks into prod posture (e.g. refuses
      # dev-loopback opt-ins — see internal/controlplane/server/http_events.go).
      PANVEX_ENV: production
      # Required: refuses to start without an explicit, non-default key.
      PANVEX_ENCRYPTION_KEY: ${PANVEX_ENCRYPTION_KEY:?PANVEX_ENCRYPTION_KEY is required for the prod profile}
      # Tunable pool sizing — see internal/controlplane/storage/postgres/pool_config.go.
      PANVEX_DB_MAX_OPEN_CONNS: ${PANVEX_DB_MAX_OPEN_CONNS:-50}
      PANVEX_DB_MAX_IDLE_CONNS: ${PANVEX_DB_MAX_IDLE_CONNS:-20}
      PANVEX_DB_CONN_MAX_LIFETIME: ${PANVEX_DB_CONN_MAX_LIFETIME:-30m}
      PANVEX_DB_CONN_MAX_IDLE_TIME: ${PANVEX_DB_CONN_MAX_IDLE_TIME:-10m}
      # Reverse-proxy / CNI subnets that may legitimately set X-Forwarded-For.
      # Default covers Docker bridge + Kubernetes default service CIDRs; tighten
      # to your actual ingress topology in production. Empty value disables
      # XFF trust entirely (rate-limit buckets the fleet as one client). (S-06)
      PANVEX_TRUSTED_PROXY_CIDRS: ${PANVEX_TRUSTED_PROXY_CIDRS:-172.16.0.0/12,10.0.0.0/8,fd00::/8}
      PANVEX_HTTP_ADDR: :8080
      PANVEX_GRPC_ADDR: :8443
      PANVEX_STORAGE_DRIVER: postgres
      # Unix-socket DSN: empty authority + host=<socket dir> tells pgx to
      # dial the local socket instead of TCP. sslmode=disable because TLS
      # over a Unix socket is meaningless. See the header note for the
      # network-isolation rationale.
      PANVEX_STORAGE_DSN: postgres://${POSTGRES_USER:-panvex}:${POSTGRES_PASSWORD}@/${POSTGRES_DB:-panvex}?host=/var/run/postgresql&sslmode=disable
    # No command: ENTRYPOINT already runs ./panvex-control-plane, and the
    # default (no-arg) subcommand is `serve`. Passing the binary path again
    # would feed it to itself as argv[1].
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Agent gRPC. Published on ALL interfaces intentionally: unlike the
      # HTTP panel (:8080, plain HTTP behind a TLS-terminating reverse
      # proxy), the gRPC channel is mTLS end-to-end — the control-plane
      # mints its server certificate from the embedded CA, agents present
      # client certificates issued at enrollment, and both sides pin SPKI
      # hashes. Publishing :8443 directly therefore does NOT expose an
      # unencrypted or unauthenticated surface.
      #
      # Expected firewall posture: allow inbound 8443/tcp from agent
      # networks (or 0.0.0.0/0 if agents roam); everything else stays
      # closed. If you prefer a single public IP on the reverse proxy,
      # use the nginx L4 stream passthrough documented in
      # deploy/networking.md and revert this mapping to
      # "127.0.0.1:8443:8443".
      - "8443:8443"
    volumes:
      - panvex_geoip:/var/lib/panvex/geoip
      # Shared Postgres socket dir (read-write: connecting writes to the
      # socket). Postgres publishes /var/run/postgresql/.s.PGSQL.5432 here.
      - panvex_pg_socket:/var/run/postgresql
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    # Must exceed cmd/control-plane controlPlaneShutdownGraceMin so the
    # audit-event drain finishes before docker sends SIGKILL.
    stop_grace_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "10"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: web
    # Wait for backend to be HEALTHY, not merely started: nginx resolves
    # the `backend` upstream at config-parse time and exits (emerg "host
    # not found in upstream") if the name is not yet registered, so on a
    # cold `up -d` it would crash-loop while the backend runs migrations.
    depends_on:
      backend:
        condition: service_healthy
    # Expose only on loopback; terminate TLS in a host reverse proxy
    # (deploy/nginx/default.conf) before exposing publicly. The nginx
    # stage is rewritten to `listen 8080;` (unprivileged port, see
    # Dockerfile), so the container port is 8080, not 80.
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "10"
    restart: unless-stopped

  # One-shot first-run admin creation. Activate explicitly:
  #
  #   POSTGRES_PASSWORD='<db-pw>' \
  #   PANVEX_ENCRYPTION_KEY='<key>' \
  #   PANVEX_BOOTSTRAP_PASSWORD='<admin-pw>' \
  #     docker compose -f deploy/docker-compose.prod.yml \
  #     --profile bootstrap run --rm bootstrap
  #
  # Reuses the same encryption key as backend (otherwise newly minted
  # secrets will be unreadable to the running service). Safe to re-run:
  # the binary refuses to plant an admin on a non-empty store.
  bootstrap:
    profiles: [bootstrap]
    build:
      context: ..
      dockerfile: Dockerfile
      target: control-plane
    env_file:
      - path: .env
        required: false
    environment:
      PANVEX_ENV: production
      PANVEX_ENCRYPTION_KEY: ${PANVEX_ENCRYPTION_KEY:?PANVEX_ENCRYPTION_KEY is required for the prod profile}
      PANVEX_BOOTSTRAP_PASSWORD: ${PANVEX_BOOTSTRAP_PASSWORD:?set PANVEX_BOOTSTRAP_PASSWORD before running --profile bootstrap}
    # ENTRYPOINT already runs ./panvex-control-plane; command: supplies only
    # the subcommand + args. The bootstrap-admin subcommand reads the admin
    # password from PANVEX_BOOTSTRAP_PASSWORD (the -password flag's default)
    # and the storage target from the flags below.
    command:
      - bootstrap-admin
      - -storage-driver
      - postgres
      - -storage-dsn
      - postgres://${POSTGRES_USER:-panvex}:${POSTGRES_PASSWORD}@/${POSTGRES_DB:-panvex}?host=/var/run/postgresql&sslmode=disable
      - -username
      - ${PANVEX_BOOTSTRAP_USERNAME:-admin}
    volumes:
      # Same shared Postgres socket dir as backend — bootstrap dials the
      # DB over the Unix socket too.
      - panvex_pg_socket:/var/run/postgresql
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "10"
    restart: "no"

volumes:
  panvex_postgres_data:
  panvex_geoip:
  # Holds the Postgres Unix socket, shared between postgres, backend, and
  # bootstrap so the DB needs no TCP listener.
  panvex_pg_socket:
