# DEV-ONLY compose profile.
#
# Requires POSTGRES_PASSWORD (and optionally POSTGRES_USER/POSTGRES_DB)
# to be supplied via .env or shell — copy deploy/.env.example to
# deploy/.env and adjust before running. `sslmode=disable` is
# convenient on a laptop and FATAL in production. For real deployments
# use docker-compose.prod.yml — that file additionally requires
# PANVEX_ENCRYPTION_KEY, sets sslmode=require, and binds publishers
# to loopback.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-panvex}
      POSTGRES_USER: ${POSTGRES_USER:-panvex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env (see .env.example)}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panvex} -d ${POSTGRES_DB:-panvex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - panvex_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: control-plane
    env_file:
      - path: .env
        required: false
    command:
      - ./panvex-control-plane
      - -http-addr
      - :8080
      - -grpc-addr
      - :8443
      - -storage-driver
      - postgres
      - -storage-dsn
      # NOTE: sslmode=disable is acceptable for local dev; use sslmode=require or stricter in production.
      - postgres://${POSTGRES_USER:-panvex}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}@postgres:5432/${POSTGRES_DB:-panvex}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - panvex_geoip:/var/lib/panvex/geoip
    # Must exceed cmd/control-plane controlPlaneShutdownGraceMin (45s) so
    # the audit-event drain finishes before docker sends SIGKILL.
    stop_grace_period: 45s

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: web
    depends_on:
      - backend
    ports:
      - "8080:80"

  # One-shot first-run admin creation. Activate explicitly:
  #
  #   PANVEX_BOOTSTRAP_PASSWORD='<pw>' \
  #   POSTGRES_PASSWORD='<db-pw>' \
  #     docker compose -f deploy/docker-compose.postgres.yml \
  #     --profile bootstrap run --rm bootstrap
  #
  # Safe to re-run: the binary refuses to plant an admin on a non-empty
  # store (see runBootstrapAdmin in cmd/control-plane/main.go).
  bootstrap:
    profiles: [bootstrap]
    build:
      context: ..
      dockerfile: Dockerfile
      target: control-plane
    command:
      - ./panvex-control-plane
      - bootstrap-admin
      - -storage-driver
      - postgres
      - -storage-dsn
      - postgres://${POSTGRES_USER:-panvex}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}@postgres:5432/${POSTGRES_DB:-panvex}?sslmode=disable
      - -username
      - ${PANVEX_BOOTSTRAP_USERNAME:-admin}
    environment:
      PANVEX_BOOTSTRAP_PASSWORD: ${PANVEX_BOOTSTRAP_PASSWORD:?set PANVEX_BOOTSTRAP_PASSWORD before running --profile bootstrap}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  panvex_postgres_data:
  panvex_geoip:
