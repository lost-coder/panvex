services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-panvex}
      POSTGRES_USER: ${POSTGRES_USER:-panvex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panvex}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panvex} -d ${POSTGRES_DB:-panvex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - panvex_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: control-plane
    env_file:
      - path: .env
        required: false
    command:
      - ./panvex-control-plane
      - -http-addr
      - :8080
      - -grpc-addr
      - :8443
      - -storage-driver
      - postgres
      - -storage-dsn
      # NOTE: sslmode=disable is acceptable for local dev; use sslmode=require or stricter in production.
      - postgres://${POSTGRES_USER:-panvex}:${POSTGRES_PASSWORD:-panvex}@postgres:5432/${POSTGRES_DB:-panvex}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8443:8443"

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      target: web
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  panvex_postgres_data:
