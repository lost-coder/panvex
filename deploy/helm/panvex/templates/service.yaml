apiVersion: v1
kind: Service
metadata:
  name: {{ include "panvex.fullname" . }}
  labels: {{- include "panvex.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "panvex.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
