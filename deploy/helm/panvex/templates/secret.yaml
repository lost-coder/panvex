{{/*
Default Secret for the database DSN. Skipped when storage.existingSecret is
provided so operators can manage the credential through external-secrets,
sealed-secrets, or any other secret-management workflow.
*/}}
{{- if and (not .Values.storage.existingSecret) .Values.storage.dsn }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "panvex.fullname" . }}-db
  labels: {{- include "panvex.labels" . | nindent 4 }}
type: Opaque
stringData:
  dsn: {{ .Values.storage.dsn | quote }}
---
{{- end }}
{{/*
Default Secret for the encryption-key passphrase. Skipped when
encryptionKey.existingSecret is provided.
*/}}
{{- if and (not .Values.encryptionKey.existingSecret) .Values.encryptionKey.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "panvex.fullname" . }}-encryption
  labels: {{- include "panvex.labels" . | nindent 4 }}
type: Opaque
stringData:
  encryption-key: {{ .Values.encryptionKey.value | quote }}
{{- end }}
