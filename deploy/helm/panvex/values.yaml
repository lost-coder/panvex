# Panvex Helm chart values.
#
# This chart deploys the control-plane as a single replica StatefulSet/Deployment
# with the embedded React UI. It does NOT bundle Postgres — bring your own
# (operator's responsibility), or run docker-compose for SQLite-backed dev.

image:
  # Operators MUST override repository to point at their registry mirror or
  # the upstream digest-pinned image. `latest` is intentionally absent from
  # this template so a fresh install never gets a moving target.
  repository: ghcr.io/lost-coder/panvex-control-plane
  tag: "0.1.0"
  pullPolicy: IfNotPresent
  # Optional: imagePullSecrets, propagated into pod spec verbatim.
  pullSecrets: []

# Number of replicas.
#
# SINGLE-INSTANCE BY DESIGN: Panvex currently runs as a single control-plane
# instance. Multi-instance / HA is not yet supported — there is no leader
# election or cross-instance coordination for the in-process workers
# (job scheduler, presence, batch-writer), so running replicaCount > 1 will
# cause duplicate work and racey state. Keep this at 1 until multi-instance
# support lands. The PodDisruptionBudget below is intentionally skipped while
# replicaCount < 2 (see podDisruptionBudget).
replicaCount: 1

# Storage driver: "postgres" or "sqlite". Sqlite is intended for dev only;
# in K8s use postgres.
storage:
  driver: postgres
  # Connection DSN — see https://github.com/jackc/pgx for syntax. Use
  # sslmode=require in production.
  dsn: ""
  # If you don't want to put the DSN in values.yaml verbatim (recommended),
  # supply it from an existing Secret with the key `dsn`.
  existingSecret: ""

# Encryption key passphrase used by the secret-vault for at-rest envelope
# encryption of TOTP secrets, client secrets, etc. PVS2 ciphertexts written
# under a different passphrase will not decrypt — treat this as load-bearing.
encryptionKey:
  # Inline value (test-only). Use existingSecret for production.
  value: ""
  existingSecret: ""
  existingSecretKey: "encryption-key"

# Network exposure. The Service is ClusterIP by default; pair with the Ingress
# block below or your own.
service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 8443

ingress:
  # When enabled=true, an Ingress for the HTTP panel is created. Agents dial
  # the gRPC port directly via the Service or a separate L4 ingress
  # (annotations vary per controller; not templated here).
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: panvex.example
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # tls:
  #   - secretName: panvex-tls
  #     hosts:
  #       - panvex.example

# Pod resources. Bumped above defaults so the audit-event drain has headroom.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# S-04 (audit-events vs SIGKILL): terminationGracePeriodSeconds MUST exceed
# controlPlaneShutdownGraceMin = 45s in cmd/control-plane/server_lifecycle.go
# so the in-flight audit batch finishes before the kubelet sends SIGKILL.
# 60s gives a 15s buffer.
terminationGracePeriodSeconds: 60

# Pod disruption budget.
#
# A PDB of minAvailable: 1 with a single replica would block voluntary node
# drains FOREVER (the only pod can never be evicted), which breaks routine
# cluster maintenance and autoscaler scale-down. Because Panvex is
# single-instance by design (see replicaCount above), the PDB template is
# only rendered when replicaCount >= 2. Setting enabled: true here is
# therefore a no-op at the default replicaCount: 1 — it takes effect only
# once HA / multi-instance support lands and you raise replicaCount.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Liveness / readiness probes.
#
# /healthz reports 200 once the HTTP listener is bound (process is up). It
# does NOT validate downstream dependencies — that is the liveness contract
# we want, otherwise a transient DB blip would cause kubelet to restart
# the pod and amplify an outage instead of waiting it out.
#
# /readyz is the gated readiness endpoint (BP-Medium): it 200s only when
# the certificate authority is initialized AND the storage backend
# responds to Ping() within 2s. A failing /readyz pulls the pod out of
# the Service endpoints without restarting it, which is the right
# response to "DB is briefly unreachable" — once the dependency
# recovers, traffic resumes automatically.
#
# See internal/controlplane/server/http_health.go for handler bodies.
probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Trusted-proxy CIDRs (S-06). Required if the panel sits behind an Ingress.
# Default covers Kubernetes service CIDRs + Docker bridge + IPv6 ULA.
trustedProxyCIDRs: "172.16.0.0/12,10.0.0.0/8,fd00::/8"

# HSTS preload opt-in (S-09). Set to "1" to enable a 2-year HSTS with the
# preload directive.
hstsPreload: ""

# Pprof separate-listener address (S-07). When non-empty (e.g. 127.0.0.1:6060)
# the panel skips the admin-router /debug/pprof registration and instead binds
# a dedicated loopback HTTP listener at this address. Operators reach pprof via
# `kubectl port-forward` or `kubectl exec`-driven curl. Empty value preserves
# the in-panel admin-only pprof.
pprofAddr: ""

# Optional: pod-level securityContext + container securityContext.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true

# Bootstrap admin job (one-shot). Set bootstrap.enabled=true to run a
# `bootstrap-admin` job once and never again. Subsequent helm upgrades
# leave the existing user untouched (`bootstrap-admin` refuses to plant
# on a non-empty store).
bootstrap:
  enabled: false
  username: admin
  passwordExistingSecret: ""
  passwordExistingSecretKey: "password"

nodeSelector: {}
tolerations: []
affinity: {}

# Default-deny NetworkPolicy. When enabled, same-namespace pods may
# reach the panel on its published HTTP/gRPC ports, plus any peers
# you whitelist under `ingressFrom`; egress is restricted to DNS and
# the Postgres backend. Disable only on clusters that already enforce
# zero-trust at the CNI/service-mesh layer.
networkPolicy:
  enabled: true
  # Cross-namespace ingress — typically your ingress controller's
  # namespace. Empty default means same-namespace only, which is
  # safe for a fresh install: a stock `helm install` produces a
  # working policy without locking the panel out. Add entries when
  # your ingress controller lives elsewhere, e.g.:
  #
  #   ingressFrom:
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: ingress-nginx
  ingressFrom: []
  # Egress: where the panel pods may dial.
  # Postgres CIDR — narrow to the actual DB subnet in production.
  postgresCIDR: "10.0.0.0/8"
  # Optional extra egress rules (e.g. OTLP collector, GeoIP fetch).
  extraEgress: []
